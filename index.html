<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OOH Intelligence PRO FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;display:flex;height:100vh;font-family:Arial;}
#map{flex:1;}
#sidebar{
width:300px;
background:#0f172a;
color:#fff;
padding:15px;
overflow:auto;
}
.kpi{background:#1e293b;padding:10px;margin:5px 0;border-radius:5px;}
button{width:100%;margin:5px 0;padding:8px;background:#334155;color:#fff;border:none;}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
<h2>📊 Dashboard</h2>
<div class="kpi" id="kpiTiendas"></div>
<div class="kpi" id="kpiSoportes"></div>

<button onclick="toggleLayer('h3')">H3</button>
<button onclick="toggleLayer('h6')">H6</button>
<button onclick="toggleLayer('h8')">H8</button>

<div id="detalle"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map').setView([-33.45,-70.65],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let capaTiendas = L.markerClusterGroup().addTo(map);
let capaSoportes = L.markerClusterGroup().addTo(map);
let capaHex = L.layerGroup().addTo(map);

let state={h3:false,h6:false,h8:false};

let tricot=[], soportes=[], h3=[], h6=[], h8=[];

// ================= CARGA REAL
async function loadData(){

tricot = await fetch('data/tricot.json').then(r=>r.json());
soportes = await fetch('data/soportes.json').then(r=>r.json());
h3 = await fetch('data/h3.json').then(r=>r.json());
h6 = await fetch('data/h6.json').then(r=>r.json());
h8 = await fetch('data/h8.json').then(r=>r.json());

init();
}

// ================= INIT
function init(){
loadTiendas();
loadSoportes();
updateKPIs();
}

// ================= TIENDAS
function loadTiendas(){
capaTiendas.clearLayers();

tricot.forEach(t=>{
let m=L.marker([t.lat,t.lng])
.bindPopup(`<b>🏬 ${t.nombre}</b>`);

m.on("click",()=>{
document.getElementById("detalle").innerHTML=`
<b>${t.nombre}</b><br>${t.comuna}
`;
});

capaTiendas.addLayer(m);
});
}

// ================= SOPORTES
function loadSoportes(){
capaSoportes.clearLayers();

soportes.forEach(s=>{
let m=L.marker([s.lat,s.lng])
.bindPopup(`<b>📍 SOPORTE</b><br>${s.tipo || ""}`);

capaSoportes.addLayer(m);
});
}

// ================= HEX
function drawHex(data,color){
L.geoJSON(data,{
style:{color:color,fillOpacity:0.3}
}).addTo(capaHex);
}

function loadHex(){
capaHex.clearLayers();

if(state.h3) drawHex(h3,"blue");
if(state.h6) drawHex(h6,"purple");
if(state.h8) drawHex(h8,"orange");
}

// ================= CONTROL
function toggleLayer(layer){
state[layer]=!state[layer];
loadHex();
}

// ================= KPIs
function updateKPIs(){
document.getElementById("kpiTiendas").innerText="Tiendas: "+tricot.length;
document.getElementById("kpiSoportes").innerText="Soportes: "+soportes.length;
}

// ================= START
loadData();

</script>

</body>
</html>
