<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

.sidebar{
width:360px;background:#0b1324;padding:15px;overflow:auto;z-index:1000
}

#map{flex:1}

.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}

select,input{
width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none
}

.chip{
display:inline-block;padding:8px 12px;margin:3px;background:#0a1b3a;border-radius:20px;cursor:pointer
}
.chip.active{background:#2563eb}

.menu-btn{
display:none;position:absolute;top:10px;left:10px;z-index:1100;
background:#2563eb;color:white;border:none;padding:10px;border-radius:8px
}

@media(max-width:768px){
.app{flex-direction:column}
.sidebar{position:absolute;width:80%;height:100%;left:-100%;top:0}
.sidebar.open{left:0}
#map{height:100vh}
.menu-btn{display:block}
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>📊 OOH Intelligence</h2>

<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Tiendas: <b id="totalTiendas">0</b></div>
<div class="stat">Comunas: <b id="totalComunas">0</b></div>

<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>

<button onclick="reset()">Reset</button>

<div>
<span class="chip active" data-layer="soportes">Soportes</span>
<span class="chip active" data-layer="tiendas">Tiendas</span>
<span class="chip active" data-layer="h3">H3</span>
<span class="chip active" data-layer="h6">H6</span>
<span class="chip" data-layer="h8">H8</span>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// MENU MOBILE
function toggleMenu(){
document.getElementById('sidebar').classList.toggle('open');
setTimeout(()=>map.invalidateSize(),300);
}

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],tiendas=[];
let filtrados=[],tiendasFiltradas=[];

// 🔥 CLUSTER PRO VISUAL
let cluster=L.markerClusterGroup({
disableClusteringAtZoom:16,
showCoverageOnHover:true,
zoomToBoundsOnClick:true,

iconCreateFunction:function(cluster){
const count=cluster.getChildCount();
return L.divIcon({
html:`<div style="
background:radial-gradient(circle,#ff2d55,#7f1d1d);
width:45px;height:45px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:white;font-weight:bold;
border:3px solid white;
box-shadow:0 0 12px rgba(0,0,0,0.6);
">${count}</div>`,
className:''
});
}
});

let h3Layer,h6Layer,h8Layer;
let h3Data, h6Data, h8Data;

const layersState={
soportes:true,tiendas:true,h3:true,h6:true,h8:false
};

// ICONO TIENDAS
const tiendaIcon = L.divIcon({
html:`<div style="
background:#2563eb;
width:24px;height:24px;border-radius:50%;
border:3px solid white;
box-shadow:0 0 12px rgba(37,99,235,0.9);
"></div>`,
className:''
});

// FUNCIONES PARA HEATMAP
function getHexCount(feature) {
    const layer = L.geoJSON(feature);
    const bounds = layer.getBounds();
    return filtrados.filter(s => bounds.contains([s.lat, s.lng])).length;
}

function getHeatmapColor(count, maxCount) {
    if (maxCount === 0) return '#22c55e'; // green
    const ratio = count / maxCount;
    const hue = 120 - (120 * ratio); // 120 green to 0 red
    return `hsl(${hue}, 70%, 50%)`;
}

function getOpacity(count, maxCount) {
    if (maxCount === 0) return 0.1;
    return 0.1 + 0.9 * (count / maxCount);
}

async function load(){

const [s,t,h3,h6,h8]=await Promise.all([
fetch('data/soportes_h3.json').then(r=>r.json()),
fetch('data/tricot.json').then(r=>r.json()),
fetch('data/h3.geojson').then(r=>r.json()),
fetch('data/h6.geojson').then(r=>r.json()),
fetch('data/h8.geojson').then(r=>r.json())
]);

soportes=s;
tiendas=t;
h3Data = h3;
h6Data = h6;
h8Data = h8;

filtrados=s;
tiendasFiltradas=t;

init();
renderHex(h3Data,h6Data,h8Data);
render();

map.on('zoomend', controlarZoom);

}

// ZOOM HEX
function controlarZoom(){
const z=map.getZoom();
layersState.h3 = z>=10 && z<=12;
layersState.h6 = z>=13 && z<=15;
layersState.h8 = z>=16;
updateHexVisibility();
}

// INIT
function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna).filter(c=>c))];
const categorias=[...new Set(soportes.map(s=>s.categoria).filter(c=>c))];

document.getElementById('comuna').innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
document.getElementById('categoria').innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

document.querySelectorAll('.chip').forEach(c=>{
c.onclick=()=>{
const k=c.dataset.layer;
layersState[k]=!layersState[k];
c.classList.toggle('active');
updateHexVisibility();
render();
};
});
}

// FILTRO
function filtrar(){

const q=document.getElementById('search').value.toLowerCase();
const comuna=document.getElementById('comuna').value;
const cat=document.getElementById('categoria').value;

filtrados=soportes.filter(s=>
(!q||s.nombre.toLowerCase().includes(q)) &&
(!comuna||s.comuna===comuna) &&
(!cat||s.categoria===cat)
);

tiendasFiltradas=tiendas.filter(t=>
(!comuna||t.comuna===comuna)
);

renderHex(h3Data, h6Data, h8Data);
render();
}

// RENDER
function render(){

map.removeLayer(cluster);
cluster.clearLayers();

let tiendasLayer = L.layerGroup();

// SOPORTES
if(layersState.soportes){
filtrados.forEach(p=>{

const zoom=map.getZoom();
const size = zoom>=16 ? 7 : zoom>=14 ? 5 : 4;

const m=L.circleMarker([p.lat,p.lng],{
radius:size,
color:'#fff',
fillColor:'#ef4444',
fillOpacity:1
});

m.bindPopup(`
<b>📍 SOPORTE</b><br>
${p.nombre}<br>
${p.comuna}<br>
${p.categoria}<br>
${p.tipo}
`);

cluster.addLayer(m);
});
}

// TIENDAS
if(layersState.tiendas){
tiendasFiltradas.forEach(t=>{

const m=L.marker([t.lat,t.lng],{icon:tiendaIcon});

m.bindPopup(()=>{

const cercanos=filtrados.filter(s=>map.distance([t.lat,t.lng],[s.lat,s.lng])<500);

let nivel="🟢 Baja";
if(cercanos.length>30) nivel="🔴 Alta";
else if(cercanos.length>10) nivel="🟡 Media";

let distancias=cercanos.map(s=>map.distance([t.lat,t.lng],[s.lat,s.lng]));
let promedio=distancias.length?Math.round(distancias.reduce((a,b)=>a+b,0)/distancias.length):0;

return `
<b>🏬 ${t.nombre}</b><br>
${t.comuna}<br><br>
📊 Soportes: ${cercanos.length}<br>
📏 Distancia promedio: ${promedio} m<br>
Nivel: ${nivel}
`;
});

tiendasLayer.addLayer(m);
});
}

map.addLayer(cluster);
map.addLayer(tiendasLayer);

// KPIs
document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalTiendas').innerText=tiendasFiltradas.length;
document.getElementById('totalComunas').innerText=new Set(filtrados.map(s=>s.comuna)).size;
}

// 🔥 HEX PRO
function renderHex(h3,h6,h8){

    // Remove old layers
    if (h3Layer) map.removeLayer(h3Layer);
    if (h6Layer) map.removeLayer(h6Layer);
    if (h8Layer) map.removeLayer(h8Layer);

    // Compute counts for each feature
    h3.features.forEach(f => f.properties.count = getHexCount(f));
    h6.features.forEach(f => f.properties.count = getHexCount(f));
    h8.features.forEach(f => f.properties.count = getHexCount(f));

    const maxH3 = Math.max(...h3.features.map(f => f.properties.count));
    const maxH6 = Math.max(...h6.features.map(f => f.properties.count));
    const maxH8 = Math.max(...h8.features.map(f => f.properties.count));

    h3Layer = L.geoJSON(h3, {
        style: function(feature) {
            const count = feature.properties.count;
            return {
                color: getHeatmapColor(count, maxH3),
                fillColor: getHeatmapColor(count, maxH3),
                opacity: 0.9,
                fillOpacity: 0,
                weight: 1
            };
        },
        onEachFeature: (f,l) => popupHex(f,l,'H3')
    }).addTo(map);

    h6Layer = L.geoJSON(h6, {
        style: function(feature) {
            const count = feature.properties.count;
            return {
                color: getHeatmapColor(count, maxH6),
                fillColor: getHeatmapColor(count, maxH6),
                opacity: 0.9,
                fillOpacity: 0,
                weight: 1
            };
        },
        onEachFeature: (f,l) => popupHex(f,l,'H6')
    }).addTo(map);

    h8Layer = L.geoJSON(h8, {
        style: function(feature) {
            const count = feature.properties.count;
            return {
                color: getHeatmapColor(count, maxH8),
                fillColor: getHeatmapColor(count, maxH8),
                opacity: 0.9,
                fillOpacity: 0,
                weight: 1
            };
        },
        onEachFeature: (f,l) => popupHex(f,l,'H8')
    }).addTo(map);

    updateHexVisibility();
}

// 🧠 ANALISIS HEX PRO
function popupHex(f,l,tipo){

l.on('click',()=>{

const bounds=l.getBounds();

const dentro=filtrados.filter(s=>{
return bounds.contains([s.lat,s.lng]);
});

let nivel="🟢 Baja";
if(dentro.length>50) nivel="🔴 Alta";
else if(dentro.length>20) nivel="🟡 Media";

l.bindPopup(`
<b>🧩 HEX ${tipo}</b><br>
Soportes: ${dentro.length}<br>
Nivel: ${nivel}
`).openPopup();

});
}

function updateHexVisibility(){
if(h3Layer) map[layersState.h3 ? 'addLayer' : 'removeLayer'](h3Layer);
if(h6Layer) map[layersState.h6 ? 'addLayer' : 'removeLayer'](h6Layer);
if(h8Layer) map[layersState.h8 ? 'addLayer' : 'removeLayer'](h8Layer);
}

function reset(){
filtrados=soportes;
tiendasFiltradas=tiendas;
map.setView([-33.45,-70.66],11);
renderHex(h3Data, h6Data, h8Data);
render();
}

load();

</script>

</body>
</html>
