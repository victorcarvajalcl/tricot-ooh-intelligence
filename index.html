<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

.sidebar{
width:360px;background:#0b1324;padding:15px;overflow:auto;z-index:1000
}

#map{flex:1}

.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}

select,input{
width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none
}

.chip{
display:inline-block;padding:8px 12px;margin:3px;background:#0a1b3a;border-radius:20px;cursor:pointer
}
.chip.active{background:#2563eb}

.menu-btn{
display:none;position:absolute;top:10px;left:10px;z-index:1100;
background:#2563eb;color:white;border:none;padding:10px;border-radius:8px
}

.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,8,20,0.98);z-index:2000}
.login-card{width:min(400px,100%);padding:32px;background:rgba(16,24,43,0.98);border:1px solid rgba(255,255,255,0.08);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,0.35);}
.login-card h2{margin:0 0 24px;font-size:28px;text-align:center;letter-spacing:0.02em;color:#f8fafc}
.login-field{margin-bottom:18px}
.login-field label{display:block;margin-bottom:8px;font-size:13px;color:#94a3b8}
.login-field input{width:100%;padding:14px 16px;border-radius:14px;background:#081a36;border:1px solid rgba(148,163,184,0.12);color:#fff;font-size:15px}
#loginBtn{width:100%;padding:14px 16px;border:none;border-radius:14px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer;transition:background .2s}
#loginBtn:hover{background:#1d4ed8}
.login-error{margin-top:14px;color:#fb7185;text-align:center;font-size:14px;min-height:20px}
.hidden{display:none!important}
.logout-btn{width:100%;padding:12px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-weight:700;cursor:pointer;margin-top:10px}

.ranking-item{padding:12px;margin:8px 0;background:rgba(37,99,235,0.1);border-left:3px solid #2563eb;border-radius:8px;cursor:pointer;transition:all .2s}
.ranking-item:hover{background:rgba(37,99,235,0.2);transform:translateX(4px)}
.ranking-item-title{font-weight:700;font-size:12px;color:#60a5fa}
.ranking-item-stats{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#94a3b8}

@media(max-width:768px){
.app{flex-direction:column}
.sidebar{position:absolute;width:80%;height:100%;left:-100%;top:0}
.sidebar.open{left:0}
#map{height:100vh}
.menu-btn{display:block}
}
</style>
</head>

<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <div class="login-field">
      <label for="loginUser">Usuario</label>
      <input id="loginUser" type="text" placeholder="admin / demo" autocomplete="username" />
    </div>
    <div class="login-field">
      <label for="loginPass">Contraseña</label>
      <input id="loginPass" type="password" placeholder="********" autocomplete="current-password" />
    </div>
    <button id="loginBtn">Entrar</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div id="mainApp" class="app hidden">

<div class="sidebar" id="sidebar">

<h2>📊 OOH Intelligence</h2>

<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Tiendas: <b id="totalTiendas">0</b></div>
<div class="stat">Comunas: <b id="totalComunas">0</b></div>
<div class="stat">Usuario: <b id="currentUser">-</b></div>

<hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:15px 0">

<div class="stat" style="background:#081a3b;border-left:3px solid #22c55e">🏆 Mejor Zona: <b id="mejorZona">-</b></div>
<div class="stat" style="background:#081a3b;border-left:3px solid #f59e0b">📊 Score Promedio: <b id="promedioScore">-</b></div>
<div class="stat" style="background:#081a3b;border-left:3px solid #8b5cf6">🧩 Hexágonos: <b id="totalHexagonos">0</b></div>

<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>

<button onclick="reset()">Reset</button>
<button id="logoutBtn" class="logout-btn hidden">Cerrar sesión</button>

<div>
<span class="chip active" data-layer="soportes">Soportes</span>
<span class="chip active" data-layer="tiendas">Tiendas</span>
<span class="chip active" data-layer="h3">H3</span>
<span class="chip active" data-layer="h6">H6</span>
<span class="chip" data-layer="h8">H8</span>
</div>

<div style="margin-top:20px;">
<h3 style="margin-top:0;margin-bottom:12px;font-size:14px">🏆 Top Oportunidades</h3>
<div id="rankingPanel" style="max-height:300px;overflow-y:auto;border-radius:12px;background:rgba(5,8,20,0.4)">
</div>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// MENU MOBILE
function toggleMenu(){
    document.getElementById('sidebar').classList.toggle('open');
    if (map) setTimeout(()=>map.invalidateSize(),300);
}

let map;

let soportes=[],tiendas=[];
let filtrados=[],tiendasFiltradas=[];

// 🔥 CLUSTER PRO VISUAL
let cluster=L.markerClusterGroup({
disableClusteringAtZoom:16,
showCoverageOnHover:true,
zoomToBoundsOnClick:true,

iconCreateFunction:function(cluster){
const count=cluster.getChildCount();
return L.divIcon({
html:`<div style="
background:radial-gradient(circle,#ff2d55,#7f1d1d);
width:45px;height:45px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:white;font-weight:bold;
border:3px solid white;
box-shadow:0 0 12px rgba(0,0,0,0.6);
">${count}</div>`,
className:''
});
}
});

let h3Layer,h6Layer,h8Layer;
let h3Data, h6Data, h8Data;
let rankingZonas = [];

const layersState={
soportes:true,tiendas:true,h3:true,h6:true,h8:false
};

// ICONO TIENDAS
const tiendaIcon = L.divIcon({
html:`<div style="
background:#2563eb;
width:24px;height:24px;border-radius:50%;
border:3px solid white;
box-shadow:0 0 12px rgba(37,99,235,0.9);
"></div>`,
className:''
});

// FUNCIONES PARA HEATMAP
function getHexCount(feature) {
    const layer = L.geoJSON(feature);
    const bounds = layer.getBounds();
    return filtrados.filter(s => bounds.contains([s.lat, s.lng])).length;
}

function getHeatmapColor(count, maxCount) {
    if (maxCount === 0) return '#22c55e'; // green
    const ratio = count / maxCount;
    const hue = 120 - (120 * ratio); // 120 green to 0 red
    return `hsl(${hue}, 70%, 50%)`;
}

function getOpacity(count, maxCount) {
    if (maxCount === 0) return 0.15;
    return 0.15 + 0.3 * (count / maxCount);
}

function normalizeH3Id(id) {
    return String(id || '').trim().toLowerCase();
}

function buildRanking(mart) {
    const ranking = mart
        .sort((a, b) => (b.score_norm || 0) - (a.score_norm || 0))
        .slice(0, 10)
        .map(m => ({
            h3_id: m.h3_id,
            score: Math.round((m.score_norm || 0) * 100) / 100,
            soportes: m.soportes || 0,
            tiendas: m.tiendas || 0
        }));
    return ranking;
}

function renderRankingPanel(ranking) {
    const panel = document.getElementById('rankingPanel');
    if (!panel || !ranking || ranking.length === 0) return;
    
    panel.innerHTML = ranking.map((item, idx) => `
        <div class="ranking-item" onclick="centerMapOnHex('${item.h3_id}')">
            <div class="ranking-item-title">#${idx+1} Score: ${item.score}</div>
            <div class="ranking-item-stats">
                <span>📍 ${item.soportes} soportes</span>
                <span>🏬 ${item.tiendas} tiendas</span>
            </div>
        </div>
    `).join('');
}

function updateTerritoryKPIs(mart) {
    if (!mart || mart.length === 0) return;
    
    const scores = mart.map(m => m.score_norm || 0);
    const maxScore = Math.max(...scores);
    const avgScore = (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(2);
    
    const maxItem = mart.find(m => m.score_norm === maxScore);
    const mejorZonaText = maxItem ? `${maxItem.h3_id.substring(0,8)}... (${maxScore.toFixed(1)})` : '-';
    
    document.getElementById('mejorZona').innerText = mejorZonaText;
    document.getElementById('promedioScore').innerText = avgScore;
    document.getElementById('totalHexagonos').innerText = mart.length;
    
    console.log('Territory KPIs updated:', { mejorZona: mejorZonaText, promedioScore: avgScore, total: mart.length });
}

function centerMapOnHex(h3_id) {
    if (!h3Data || !h3Data.features) return;
    const feature = h3Data.features.find(f => 
        normalizeH3Id(f.properties.h3 || f.properties.h3_id) === normalizeH3Id(h3_id)
    );
    if (!feature) return;
    
    const layer = L.geoJSON(feature);
    const bounds = layer.getBounds();
    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
    
    // Abrir popup automáticamente
    setTimeout(() => {
        if (h3Layer) {
            h3Layer.eachLayer(lyr => {
                const lyrFeature = lyr.feature;
                if (lyrFeature && normalizeH3Id(lyrFeature.properties.h3 || lyrFeature.properties.h3_id) === normalizeH3Id(h3_id)) {
                    lyr.openPopup();
                }
            });
        }
    }, 300);
    
    console.log('✨ Centrado en hexágono:', h3_id);
}

function getScoreColor(score_norm) {
    // Alto score = verde, bajo = rojo
    const hue = 120 - (score_norm / 100) * 120;
    return `hsl(${hue}, 70%, 50%)`;
}

const credentials = {
    admin: 'admin123',
    demo: 'demo123'
};

function showLogin(){
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('logoutBtn').classList.add('hidden');
}

function showApp(){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    document.getElementById('currentUser').innerText = localStorage.getItem('ooh_user') || '-';
    if (map) setTimeout(()=>map.invalidateSize(), 200);
}

function login(){
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const error = document.getElementById('loginError');
    error.innerText = '';

    if (!user || !pass) {
        error.innerText = 'Ingrese usuario y contraseña';
        return;
    }

    if (credentials[user] === pass) {
        localStorage.setItem('ooh_user', user);
        showApp();
        startApp();
    } else {
        error.innerText = 'Usuario o contraseña incorrectos';
    }
}

function logout(){
    localStorage.removeItem('ooh_user');
    showLogin();
}

function initAuth(){
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    ['loginUser', 'loginPass'].forEach(id => {
        document.getElementById(id).addEventListener('keyup', e => {
            if (e.key === 'Enter') login();
        });
    });

    const user = localStorage.getItem('ooh_user');
    if (user) {
        showApp();
        startApp();
    } else {
        showLogin();
    }
}

function startApp(){
    if (!map) {
        map = L.map('map').setView([-33.45,-70.66],11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    if (!soportes.length) {
        load();
    } else {
        renderHex(h3Data, h6Data, h8Data);
        render();
    }
}

async function load(){

const [s,t,h3,h6,h8]=await Promise.all([
fetch('data/soportes_h3.json').then(r=>r.json()),
fetch('data/tricot.json').then(r=>r.json()),
fetch('data/h3.geojson').then(r=>r.json()),
fetch('data/h6.geojson').then(r=>r.json()),
fetch('data/h8.geojson').then(r=>r.json())
]);

soportes=s;
tiendas=t;
h3Data = h3;
h6Data = h6;
h8Data = h8;

filtrados=s;
tiendasFiltradas=t;

init();
renderHex(h3Data,h6Data,h8Data);
render();

map.on('zoomend', controlarZoom);

}

// ZOOM HEX
function controlarZoom(){
const z=map.getZoom();
layersState.h3 = z>=10 && z<=12;
layersState.h6 = z>=13 && z<=15;
layersState.h8 = z>=16;
updateHexVisibility();
}

// INIT
function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna).filter(c=>c))];
const categorias=[...new Set(soportes.map(s=>s.categoria).filter(c=>c))];

document.getElementById('comuna').innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
document.getElementById('categoria').innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

document.querySelectorAll('.chip').forEach(c=>{
c.onclick=()=>{
const k=c.dataset.layer;
layersState[k]=!layersState[k];
c.classList.toggle('active');
updateHexVisibility();
render();
};
});
}

// FILTRO
function filtrar(){

const q=document.getElementById('search').value.toLowerCase();
const comuna=document.getElementById('comuna').value;
const cat=document.getElementById('categoria').value;

filtrados=soportes.filter(s=>
(!q||s.nombre.toLowerCase().includes(q)) &&
(!comuna||s.comuna===comuna) &&
(!cat||s.categoria===cat)
);

tiendasFiltradas=tiendas.filter(t=>
(!comuna||t.comuna===comuna)
);

renderHex(h3Data, h6Data, h8Data);
render();
}

// RENDER
function render(){

map.removeLayer(cluster);
cluster.clearLayers();

let tiendasLayer = L.layerGroup();

// SOPORTES
if(layersState.soportes){
filtrados.forEach(p=>{

const zoom=map.getZoom();
const size = zoom>=16 ? 7 : zoom>=14 ? 5 : 4;

const m=L.circleMarker([p.lat,p.lng],{
radius:size,
color:'#fff',
fillColor:'#ef4444',
fillOpacity:1
});

m.bindPopup(`
<b>📍 SOPORTE</b><br>
${p.nombre}<br>
${p.comuna}<br>
${p.categoria}<br>
${p.tipo}
`);

cluster.addLayer(m);
});
}

// TIENDAS
if(layersState.tiendas){
tiendasFiltradas.forEach(t=>{

const m=L.marker([t.lat,t.lng],{icon:tiendaIcon});

m.bindPopup(()=>{

const cercanos=filtrados.filter(s=>map.distance([t.lat,t.lng],[s.lat,s.lng])<500);

let nivel="🟢 Baja";
if(cercanos.length>30) nivel="🔴 Alta";
else if(cercanos.length>10) nivel="🟡 Media";

let distancias=cercanos.map(s=>map.distance([t.lat,t.lng],[s.lat,s.lng]));
let promedio=distancias.length?Math.round(distancias.reduce((a,b)=>a+b,0)/distancias.length):0;

return `
<b>🏬 ${t.nombre}</b><br>
${t.comuna}<br><br>
📊 Soportes: ${cercanos.length}<br>
📏 Distancia promedio: ${promedio} m<br>
Nivel: ${nivel}
`;
});

tiendasLayer.addLayer(m);
});
}

map.addLayer(cluster);
map.addLayer(tiendasLayer);

// KPIs
document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalTiendas').innerText=tiendasFiltradas.length;
document.getElementById('totalComunas').innerText=new Set(filtrados.map(s=>s.comuna)).size;
renderRankingPanel(rankingZonas);
}

// 🔥 HEX PRO
function renderHex(h3,h6,h8){

    // Cargar mart universal
    fetch('data/mart_universal.json').then(r=>r.json()).then(mart => {

    // Calcular scores
    mart.forEach(m => {
        m.score = (m.densidad_soportes * 0.6) - (m.tiendas * 0.4);
    });

    const scores = mart.map(m => m.score);
    const minScore = Math.min(...scores);
    const maxScore = Math.max(...scores);

    // Normalizar scores 0-100
    mart.forEach(m => {
        m.score_norm = maxScore > minScore ? ((m.score - minScore) / (maxScore - minScore)) * 100 : 50;
    });

    // Construir ranking de top 10 zonas
    rankingZonas = buildRanking(mart);
    console.log('🏆 Top 10 Zonas por Score Territorial:', rankingZonas);
    renderRankingPanel(rankingZonas);
    updateTerritoryKPIs(mart);

    // Remove old layers
    if (h3Layer) map.removeLayer(h3Layer);
    if (h6Layer) map.removeLayer(h6Layer);
    if (h8Layer) map.removeLayer(h8Layer);

    // Compute counts for H6 and H8
    h6.features.forEach(f => f.properties.count = getHexCount(f));
    h8.features.forEach(f => f.properties.count = getHexCount(f));

    const maxH6 = Math.max(...h6.features.map(f => f.properties.count));
    const maxH8 = Math.max(...h8.features.map(f => f.properties.count));

    const martMap = {};
    mart.forEach(m => {
        martMap[normalizeH3Id(m.h3_id)] = m;
    });

    console.log('renderHex martMap entries', Object.keys(martMap).length, 'h3 features', h3.features.length);

    const getH3Style = (feature) => {
        const rawId = feature.properties.h3 || feature.properties.h3_id || '';
        const h3_id = normalizeH3Id(rawId);
        const martData = martMap[h3_id];
        console.log('renderHex match', {rawId, normalized: h3_id, matched: !!martData});

        if (!martData) {
            return {
                color: '#9ca3af',
                fillColor: '#9ca3af',
                opacity: 0.9,
                fillOpacity: 0.2,
                weight: 1
            };
        }

        const score_norm = Number.isFinite(martData.score_norm) ? martData.score_norm : 0;
        return {
            color: getScoreColor(score_norm),
            fillColor: getScoreColor(score_norm),
            opacity: 0.9,
            fillOpacity: getOpacity(score_norm, 100),
            weight: 1
        };
    };

    h3Layer = L.geoJSON(h3, {
        style: getH3Style,
        onEachFeature: (f,l) => popupHex(f,l,'H3', martMap)
    }).addTo(map);

    h6Layer = L.geoJSON(h6, {
        style: function(feature) {
            const count = feature.properties.count;
            return {
                color: getHeatmapColor(count, maxH6),
                fillColor: getHeatmapColor(count, maxH6),
                opacity: 0.9,
                fillOpacity: getOpacity(count, maxH6),
                weight: 1
            };
        },
        onEachFeature: (f,l) => popupHex(f,l,'H6')
    }).addTo(map);

    h8Layer = L.geoJSON(h8, {
        style: function(feature) {
            const count = feature.properties.count;
            return {
                color: getHeatmapColor(count, maxH8),
                fillColor: getHeatmapColor(count, maxH8),
                opacity: 0.9,
                fillOpacity: getOpacity(count, maxH8),
                weight: 1
            };
        },
        onEachFeature: (f,l) => popupHex(f,l,'H8')
    }).addTo(map);

    updateHexVisibility();

    }).catch(err => {
        console.error('Error cargando mart:', err);

        if (h3Layer) map.removeLayer(h3Layer);
        if (h6Layer) map.removeLayer(h6Layer);
        if (h8Layer) map.removeLayer(h8Layer);

        h3Layer = L.geoJSON(h3, {
            style: {
                color: '#9ca3af',
                fillColor: '#9ca3af',
                opacity: 0.9,
                fillOpacity: 0.2,
                weight: 1
            },
            onEachFeature: (f,l) => popupHex(f,l,'H3', {})
        }).addTo(map);

        h6Layer = L.geoJSON(h6, {
            style: function(feature) {
                const count = feature.properties.count || 0;
                return {
                    color: getHeatmapColor(count, 1),
                    fillColor: getHeatmapColor(count, 1),
                    opacity: 0.9,
                    fillOpacity: getOpacity(count, 1),
                    weight: 1
                };
            },
            onEachFeature: (f,l) => popupHex(f,l,'H6')
        }).addTo(map);

        h8Layer = L.geoJSON(h8, {
            style: function(feature) {
                const count = feature.properties.count || 0;
                return {
                    color: getHeatmapColor(count, 1),
                    fillColor: getHeatmapColor(count, 1),
                    opacity: 0.9,
                    fillOpacity: getOpacity(count, 1),
                    weight: 1
                };
            },
            onEachFeature: (f,l) => popupHex(f,l,'H8')
        }).addTo(map);

        updateHexVisibility();
    });
}

// 🧠 ANALISIS HEX PRO
function popupHex(f,l,tipo,mart=null){

l.on('click',()=>{

if (tipo === 'H3' && mart) {
    const h3_id = normalizeH3Id(f.properties.h3 || f.properties.h3_id);
    const martData = mart[h3_id];
    if (martData) {
        const score_norm = martData.score_norm;
        let nivel = "🔴 Bajo";
        if (score_norm > 66) nivel = "🟢 Alto";
        else if (score_norm > 33) nivel = "🟡 Medio";

        l.bindPopup(`
<b>🧩 HEX ${tipo}</b><br>
Soportes: ${martData.soportes}<br>
Tiendas: ${martData.tiendas}<br>
Densidad soportes: ${martData.densidad_soportes} /km²<br>
Score: ${score_norm.toFixed(1)}<br>
Nivel: ${nivel}
`).openPopup();
        return;
    }

    l.bindPopup(`
<b>🧩 HEX ${tipo}</b><br>
Datos no disponibles<br>
`).openPopup();
    return;
}

const bounds=l.getBounds();

const dentro=filtrados.filter(s=>{
return bounds.contains([s.lat,s.lng]);
});

let nivel="🟢 Baja";
if(dentro.length>50) nivel="🔴 Alta";
else if(dentro.length>20) nivel="🟡 Media";

l.bindPopup(`
<b>🧩 HEX ${tipo}</b><br>
Soportes: ${dentro.length}<br>
Nivel: ${nivel}
`).openPopup();

});
}

function updateHexVisibility(){
if(h3Layer) map[layersState.h3 ? 'addLayer' : 'removeLayer'](h3Layer);
