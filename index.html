<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricot OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:340px;
background:#0b1324;
padding:15px;
overflow:auto;
}

.card{
background:#111827;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.kpi{
font-size:22px;
font-weight:bold;
}

.map{flex:1}

.chip{
display:inline-block;
padding:6px 10px;
margin:4px;
background:#1e293b;
border-radius:20px;
cursor:pointer;
}
.chip.active{background:#2563eb}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:absolute;
z-index:1000;
width:85%;
height:100%;
left:-100%;
transition:0.3s;
}
.sidebar.open{left:0}
.toggle{
position:absolute;
top:10px;
left:10px;
background:#2563eb;
padding:8px;
border-radius:6px;
cursor:pointer;
z-index:1200;
}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<div>Soportes</div>
<div class="kpi" id="kpiSoportes">0</div>
</div>

<div class="card">
<div>Comuna</div>
<div id="comunaSel">—</div>
</div>

<div class="card">
<div>Insight Comercial</div>
<div id="insight">Selecciona una zona</div>
</div>

<div class="card">
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="tricot">Tricot</div>
<div class="chip active" data-layer="comunas">Comunas</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
</div>

</div>

<div class="map" id="map"></div>

</div>

<div class="toggle" onclick="toggleSidebar()">☰</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// MAPA
const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// DATA
let soportes=[],tricot=[],h6,h8,comunas;

// CAPAS
let capaComunas=L.layerGroup().addTo(map);
let capaH6=L.layerGroup().addTo(map);
let capaH8=L.layerGroup().addTo(map);

let cluster=L.markerClusterGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);

// ICONOS
const iconTricot=L.divIcon({
html:"<div style='font-size:28px'>🏬</div>"
});

const iconSoporte=L.divIcon({
html:"<div style='width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

// ESTADO
let state={soportes:true,tricot:true,comunas:true,h6:true,h8:false};

// LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot.json").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json()),
fetch("data/h8.geojson").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json())
]).then(([s,t,h6d,h8d,c])=>{
soportes=s;
tricot=t;
h6=h6d;
h8=h8d;
comunas=c;
init();
});

// INIT
function init(){

document.querySelectorAll(".chip").forEach(chip=>{
chip.onclick=()=>{
let k=chip.dataset.layer;
state[k]=!state[k];
chip.classList.toggle("active");
render();
};
});

map.on("zoomend moveend",render);

render();
}

// RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaH6.clearLayers();
capaH8.clearLayers();

let z=map.getZoom();

// ================= COMUNAS (AHORA VISIBLES)
if(state.comunas){
L.geoJSON(comunas,{
style:{
color:"#94a3b8",
weight:1,
fillOpacity:0.1   // 🔥 ahora sí visible
},
onEachFeature:(f,l)=>{

let nombre = f.properties.NOM_COM || f.properties.Comuna;

l.bindTooltip(nombre);

// hover
l.on('mouseover',()=>{
l.setStyle({weight:3,color:"#22c55e",fillOpacity:0.2});
});

// out
l.on('mouseout',()=>{
l.setStyle({weight:1,color:"#94a3b8",fillOpacity:0.1});
});

// click PRO
l.on('click',()=>{

let soportesComuna = soportes.filter(s=>clean(s.comuna)===clean(nombre));
let tiendasComuna = tricot.filter(t=>clean(t.comuna)===clean(nombre));

let densidad = soportesComuna.length;

let insightText =
densidad>200?"🔥 Zona saturada (alta competencia)":
densidad>100?"⚡ Buena cobertura (equilibrio)":
"🧊 Oportunidad comercial (baja cobertura)";

document.getElementById("comunaSel").innerText = nombre;
document.getElementById("insight").innerHTML = `
Soportes: ${soportesComuna.length}<br>
Tiendas: ${tiendasComuna.length}<br><br>
${insightText}
`;

map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);
}

// ================= H6
if(z<=13 && state.h6){
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;
return{
color:"#2563eb",
fillColor:getColor(s),
fillOpacity:0.3
};
}
}).addTo(capaH6);
}

// ================= H8
if(z>13 && state.h8){
L.geoJSON(h8,{
style:{color:"#9333ea",fillOpacity:0.4}
}).addTo(capaH8);
}

// ================= SOPORTES
if(state.soportes){
soportes.forEach(p=>{
if(!p.lat||!p.lng)return;
cluster.addLayer(L.marker([p.lat,p.lng],{icon:iconSoporte}));
});
}

// ================= TRICOT
if(state.tricot){
tricot.forEach(t=>{
if(!t.lat||!t.lng)return;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.bindPopup(`<b>🏬 ${t.nombre||"Tienda Tricot"}</b><br>${t.comuna}`);

capaTricot.addLayer(m);
});
}

// KPI
kpiSoportes.innerText=soportes.length;

// ORDEN CAPAS
cluster.bringToFront();
capaTricot.bringToFront();

}

// UTILS
function clean(str){
return (str||"").toLowerCase().trim();
}

function getColor(s){
if(s>20)return "#1d4ed8";
if(s>10)return "#3b82f6";
if(s>5)return "#60a5fa";
return "#93c5fd";
}

// MOBILE
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
