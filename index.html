<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.app{display:flex;height:100vh}

.sidebar{
width:360px;
background:#0f172a;
padding:15px;
overflow:auto;
}

.card{
background:#111827;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.map{flex:1}

.btn{
background:#1e293b;
padding:8px;
margin-top:5px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.btn.active{background:#2563eb}

.kpi{font-weight:bold;font-size:18px}
select{width:100%;padding:6px}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<h3>Filtro Comuna</h3>
<select id="filtroComuna"></select>
</div>

<div class="card">
<h3>Capas</h3>
<div class="btn active" id="btnSoportes">Soportes</div>
<div class="btn active" id="btnTiendas">Tiendas</div>
<div class="btn active" id="btnH3">H3</div>
<div class="btn active" id="btnH6">H6</div>
<div class="btn" id="btnH8">H8</div>
<div class="btn active" id="btnComunas">Comunas</div>
</div>

<div class="card">
<h3>KPIs</h3>
<div id="kpiSoportes"></div>
<div id="kpiTiendas"></div>
</div>

<div class="card">
<h3>Análisis</h3>
<div id="detalle">Haz click en mapa</div>
</div>

</div>

<div id="map" class="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// ================= MAPA
const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= ESTADO
let state={
soportes:true,
tiendas:true,
h3:true,
h6:true,
h8:false,
comunas:true
};

let selectedComuna=null;

// ================= DATA
let soportes=[],tricot=[],comunas,h3,h6,h8;

// ================= CAPAS
let capaH3=L.layerGroup();
let capaH6=L.layerGroup();
let capaH8=L.layerGroup();
let capaComunas=L.layerGroup();
let capaTricot=L.layerGroup();

let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15
}).addTo(map);

// ================= ICONOS
const iconSoporte=L.divIcon({
html:"<div style='width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='background:#2563eb;color:white;padding:6px 10px;border-radius:10px;font-size:12px'>🏬 Tricot</div>",
className:""
});

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot_h3.json").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json()),
fetch("data/h3.geojson").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json()),
fetch("data/h8.geojson").then(r=>r.json())
]).then(([s,t,c,h3d,h6d,h8d])=>{

soportes=s.map(p=>({...p,lat:+p.lat,lng:+p.lng}));
tricot=t.map(p=>({...p,lat:+p.lat,lng:+p.lng}));

comunas=c;
h3=h3d;
h6=h6d;
h8=h8d;

init();
});

// ================= INIT
function init(){
initFiltro();
initButtons();
render();
}

// ================= BOTONES
function initButtons(){

Object.keys(state).forEach(key=>{
let btn=document.getElementById("btn"+key.charAt(0).toUpperCase()+key.slice(1));

if(btn){
btn.onclick=()=>{
state[key]=!state[key];
btn.classList.toggle("active");
render();
};
}
});
}

// ================= FILTRO
function initFiltro(){

let comunasUnicas=[...new Set(soportes.map(s=>s.comuna))];

filtroComuna.innerHTML="<option value=''>Todas</option>";

comunasUnicas.forEach(c=>{
filtroComuna.innerHTML+=`<option value="${c}">${c}</option>`;
});

filtroComuna.onchange=()=>{
selectedComuna=filtroComuna.value||null;
render();
};
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaH3.clearLayers();
capaH6.clearLayers();
capaH8.clearLayers();
capaComunas.clearLayers();

// ================= HEX DINÁMICO
let zoom=map.getZoom();

if(state.h3 && zoom<9){
L.geoJSON(h3,{
style:{color:"#334155",fillOpacity:0.05},
onEachFeature:(f,l)=>{
l.on("click",()=>{
updateDetalle(`H3<br>Soportes:${f.properties.soportes||0}`);
});
}
}).addTo(capaH3);
map.addLayer(capaH3);
}

if(state.h6 && zoom>=9 && zoom<=13){
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;
return{color:"#2563eb",fillColor:getColor(s),fillOpacity:0.3};
},
onEachFeature:(f,l)=>{
l.on("click",()=>{
updateDetalle(`H6<br>Soportes:${f.properties.soportes}`);
});
}
}).addTo(capaH6);
map.addLayer(capaH6);
}

if(state.h8 && zoom>13){
L.geoJSON(h8,{
style:f=>{
let s=f.properties.soportes||0;
return{color:"#9333ea",fillColor:getColor(s),fillOpacity:0.4};
},
onEachFeature:(f,l)=>{
l.on("click",()=>{
updateDetalle(`H8<br>Soportes:${f.properties.soportes}`);
});
}
}).addTo(capaH8);
map.addLayer(capaH8);
}

// ================= COMUNAS
if(state.comunas){
L.geoJSON(comunas,{
style:{color:"#22c55e",weight:2,fillOpacity:0.05},
onEachFeature:(f,l)=>{
let nombre=f.properties.NOM_COM;

l.bindTooltip(nombre);

l.on("click",()=>{
selectedComuna=nombre;
filtroComuna.value=nombre;
render();
});
}
}).addTo(capaComunas);
map.addLayer(capaComunas);
}

// ================= SOPORTES
if(state.soportes){
soportes.forEach(p=>{
if(!p.lat||!p.lng)return;
if(selectedComuna && p.comuna!==selectedComuna)return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`${p.comuna}<br>${p.categoria}`);
});

cluster.addLayer(m);
});
}

// ================= TIENDAS
if(state.tiendas){
tricot.forEach(t=>{
if(!t.lat||!t.lng)return;
if(selectedComuna && t.comuna!==selectedComuna)return;

let cercanos=soportes.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`🏬 ${t.nombre}<br>${t.comuna}<br>Soportes:${cercanos}`);
});

capaTricot.addLayer(m);
});
map.addLayer(capaTricot);
}

// ================= KPI
kpiSoportes.innerText="Soportes: "+soportes.length;
kpiTiendas.innerText="Tiendas: "+tricot.length;

}

// ================= UTILS
function updateDetalle(txt){
document.getElementById("detalle").innerHTML=txt;
}

function getColor(s){
if(s>200)return "#1d4ed8";
if(s>100)return "#3b82f6";
if(s>50)return "#60a5fa";
return "#93c5fd";
}

// ================= EVENTOS
map.on("zoomend moveend",render);

</script>

</body>
</html>
