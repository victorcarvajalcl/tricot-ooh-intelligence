<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tricot OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.app{display:flex;height:100vh}

.sidebar{
width:360px;
background:#0f172a;
padding:15px;
overflow:auto;
}

.card{
background:#111827;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.map{flex:1}

h3{margin:5px 0}
select{width:100%;padding:6px;margin-top:5px}

.btn{
display:block;
padding:8px;
margin-top:5px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.btn.active{background:#2563eb}

.kpi{font-weight:bold;font-size:18px}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<h3>Filtro Comuna</h3>
<select id="filtroComuna"></select>
</div>

<div class="card">
<h3>Capas</h3>
<div class="btn active" id="btnSoportes">Soportes</div>
<div class="btn active" id="btnTiendas">Tiendas</div>
<div class="btn active" id="btnComunas">Comunas</div>
</div>

<div class="card">
<h3>KPIs</h3>
<div id="kpiSoportes" class="kpi"></div>
<div id="kpiTiendas" class="kpi"></div>
</div>

<div class="card">
<h3>Análisis</h3>
<div id="detalle">Haz click en mapa</div>
</div>

</div>

<div id="map" class="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// ================= MAPA
const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= ESTADO
let state={
soportes:true,
tiendas:true,
comunas:true
};

let selectedComuna=null;

// ================= DATA
let soportes=[],tricot=[],comunas,h6;
let filtrados=[],tricotFiltrado=[];

// ================= CAPAS
let capaHex=L.layerGroup().addTo(map);
let capaComunas=L.layerGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);

let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15
}).addTo(map);

// ================= ICONOS
const iconSoporte=L.divIcon({
html:"<div style='width:10px;height:10px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:30px'>🏬</div>"
});

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot_h3.json").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json())
]).then(([s,t,c,h])=>{
soportes=s;
tricot=t;
comunas=c;
h6=h;

filtrados=s;
tricotFiltrado=t;

init();
});

// ================= INIT
function init(){

initFiltro();
initButtons();

render();
updateDashboard();
}

// ================= BOTONES
function initButtons(){

document.getElementById("btnSoportes").onclick=()=>{
state.soportes=!state.soportes;
toggleBtn("btnSoportes");
render();
};

document.getElementById("btnTiendas").onclick=()=>{
state.tiendas=!state.tiendas;
toggleBtn("btnTiendas");
render();
};

document.getElementById("btnComunas").onclick=()=>{
state.comunas=!state.comunas;
toggleBtn("btnComunas");
render();
};
}

function toggleBtn(id){
document.getElementById(id).classList.toggle("active");
}

// ================= FILTRO
function initFiltro(){

let comunasUnicas=[...new Set(soportes.map(s=>s.comuna))];

let select=document.getElementById("filtroComuna");

select.innerHTML="<option value=''>Todas</option>";

comunasUnicas.forEach(c=>{
select.innerHTML+=`<option value="${c}">${c}</option>`;
});

select.onchange=()=>{
selectedComuna=select.value || null;
applyFilter();
};
}

function applyFilter(){

filtrados=soportes.filter(s=>{
return !selectedComuna || s.comuna===selectedComuna;
});

tricotFiltrado=tricot.filter(t=>{
return !selectedComuna || t.comuna===selectedComuna;
});

render();
updateDashboard();
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaHex.clearLayers();

// ================= HEX
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;

return{
color:"#2563eb",
fillColor:s>200?"#1e3a8a":s>100?"#2563eb":"#93c5fd",
fillOpacity:0.3
};
}
}).addTo(capaHex);

// ================= COMUNAS
if(state.comunas){
L.geoJSON(comunas,{
style:{color:"#22c55e",weight:2,fillOpacity:0.05},
onEachFeature:(f,l)=>{

let nombre=f.properties.NOM_COM;

l.bindTooltip(nombre);

l.on("click",()=>{
selectedComuna=nombre;
applyFilter();
map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);
}

// ================= SOPORTES
if(state.soportes){
filtrados.forEach(p=>{
if(!p.lat)return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`
<b>Soporte</b><br>
${p.comuna}<br>
${p.categoria}
`);
});

cluster.addLayer(m);
});
}

// ================= TIENDAS
if(state.tiendas){
tricotFiltrado.forEach(t=>{
if(!t.lat)return;

let cercanos=filtrados.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`
<b>🏬 ${t.nombre}</b><br>
${t.comuna}<br>
Soportes cercanos: ${cercanos}
`);
});

capaTricot.addLayer(m);
});
}

// ORDEN
capaHex.bringToBack();
cluster.bringToFront();
capaTricot.bringToFront();

}

// ================= DASHBOARD
function updateDashboard(){
kpiSoportes.innerText="Soportes: "+filtrados.length;
kpiTiendas.innerText="Tiendas: "+tricotFiltrado.length;
}

// ================= DETALLE
function updateDetalle(txt){
document.getElementById("detalle").innerHTML=txt;
}

</script>

</body>
</html>
