<script>

// ================= MAPA
const map=L.map('map').setView([-33.45,-70.66],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= DATA
let soportes=[],tricot=[],comunas,h6;
let filtrados=[],tricotFiltrado=[];

let selectedComuna=null;

// ================= CAPAS
let capaHex=L.layerGroup().addTo(map);
let capaComunas=L.layerGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);
let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15
}).addTo(map);

// ================= ICONOS
const iconSoporte=L.divIcon({
html:"<div style='width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:30px'>🏬</div>"
});

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot.json").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json())
]).then(([s,t,c,h])=>{
soportes=s;
tricot=t;
comunas=c;
h6=h;

filtrados=soportes;
tricotFiltrado=tricot;

init();
});

// ================= INIT
function init(){
initFiltro();
render();
updateDashboard();
}

// ================= FILTRO
function initFiltro(){

let comunasUnicas=[...new Set(soportes.map(s=>clean(s.comuna)))];

filtroComuna.innerHTML="<option value=''>Todas</option>";

comunasUnicas.forEach(c=>{
filtroComuna.innerHTML+=`<option value="${c}">${c}</option>`;
});

filtroComuna.onchange=()=>{
selectedComuna=filtroComuna.value || null;
applyFilter();
};
}

function applyFilter(){
filtrados=soportes.filter(s=>!selectedComuna || clean(s.comuna)===selectedComuna);
tricotFiltrado=tricot.filter(t=>!selectedComuna || clean(t.comuna)===selectedComuna);

render();
updateDashboard();
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaHex.clearLayers();

// HEX
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;
return{
color:"#2563eb",
fillColor:s>20?"#1d4ed8":s>10?"#3b82f6":"#93c5fd",
fillOpacity:0.2
};
}
}).addTo(capaHex);

// ================= COMUNAS
L.geoJSON(comunas,{
style:{
color:"#22c55e",
weight:2,
fillOpacity:0.05
},
onEachFeature:(f,l)=>{

let nombre=f.properties.NOM_COM || f.properties.Comuna;

l.bindTooltip(nombre);

l.on("click",()=>{
selectedComuna=clean(nombre);
filtroComuna.value=selectedComuna;
applyFilter();

map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);

// ================= SOPORTES
filtrados.forEach(p=>{
if(!p.lat)return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`
<b>Soporte</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}<br>
📢 ${p.tipo||"-"}
`);
});

cluster.addLayer(m);
});

// ================= TIENDAS
tricotFiltrado.forEach(t=>{
if(!t.lat)return;

let cercanos=filtrados.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`
<b>🏬 ${t.nombre||"Tienda Tricot"}</b><br>
📍 ${t.comuna}<br>
Soportes cercanos: ${cercanos}<br>
${getInsight(cercanos)}
`);
});

capaTricot.addLayer(m);
});

// ORDEN
capaHex.bringToBack();
capaComunas.bringToFront();
cluster.bringToFront();
capaTricot.bringToFront();

}

// ================= DASHBOARD BI
function updateDashboard(){

let totalSoportes=filtrados.length;
let totalTiendas=tricotFiltrado.length;

// KPI FIX
kpiSoportes.innerText="Soportes: "+totalSoportes;
kpiTiendas.innerText="Tiendas: "+totalTiendas;

// INSIGHT GLOBAL
let insight="";

if(totalSoportes>2000){
insight="🔥 Alta saturación publicitaria";
}else if(totalSoportes>800){
insight="⚡ Cobertura equilibrada";
}else{
insight="🧊 Oportunidad de crecimiento";
}

detalle.innerHTML=`
<b>Resumen</b><br>
Comuna: ${selectedComuna || "Todas"}<br>
Soportes: ${totalSoportes}<br>
Tiendas: ${totalTiendas}<br>
<br>
💡 ${insight}
`;
}

// ================= UTILS
function clean(str){
return (str||"").toLowerCase().trim();
}

function updateDetalle(txt){
detalle.innerHTML=txt;
}

function getInsight(n){
if(n>50)return "🔥 Saturado";
if(n>20)return "⚡ Medio";
return "🧊 Oportunidad";
}

</script>
