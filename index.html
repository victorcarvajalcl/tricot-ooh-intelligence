<script>

// ================= MAPA
const map=L.map('map',{zoomControl:true}).setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
attribution:'© CARTO'
}).addTo(map);

// ================= DATA
let soportes=[],tricot=[],comunas,h6;
let filtrados=[],tricotFiltrado=[];
let selectedComuna=null;

// ================= CAPAS
let capaHex=L.layerGroup().addTo(map);
let capaComunas=L.layerGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);

let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15,
spiderfyOnMaxZoom:true,
showCoverageOnHover:false
}).addTo(map);

// ================= ICONOS PRO
const iconSoporte=L.divIcon({
html:"<div style='width:10px;height:10px;background:#ef4444;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.6)'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:30px;filter:drop-shadow(0 0 6px black)'>🏬</div>"
});

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot.json").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json())
]).then(([s,t,c,h])=>{
soportes=s;
tricot=t;
comunas=c;
h6=h;

filtrados=soportes;
tricotFiltrado=tricot;

init();
});

// ================= INIT
function init(){
initFiltro();
render();
updateDashboard();
}

// ================= FILTRO
function initFiltro(){
let comunasUnicas=[...new Set(soportes.map(s=>clean(s.comuna)))];

filtroComuna.innerHTML="<option value=''>Todas</option>";

comunasUnicas.forEach(c=>{
filtroComuna.innerHTML+=`<option value="${c}">${c}</option>`;
});

filtroComuna.onchange=()=>{
selectedComuna=filtroComuna.value || null;
applyFilter();
};
}

function applyFilter(){
filtrados=soportes.filter(s=>!selectedComuna || clean(s.comuna)===selectedComuna);
tricotFiltrado=tricot.filter(t=>!selectedComuna || clean(t.comuna)===selectedComuna);

render();
updateDashboard();
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaHex.clearLayers();

// ================= HEX HEATMAP
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;

let color=
s>200?"#1e3a8a":
s>100?"#2563eb":
s>50?"#3b82f6":
"#93c5fd";

return{
color:color,
fillColor:color,
fillOpacity:0.35,
weight:1
};
},
onEachFeature:(f,l)=>{
let s=f.properties.soportes||0;

l.on("click",()=>{
updateDetalle(`
<b>Zona H6</b><br>
Soportes: ${s}<br>
${getInsight(s)}
`);
});
}
}).addTo(capaHex);

// ================= COMUNAS SUAVES
L.geoJSON(comunas,{
style:{
color:"#16a34a",
weight:1,
fillOpacity:0.03
},
onEachFeature:(f,l)=>{
let nombre=f.properties.NOM_COM;

l.bindTooltip(nombre);

l.on("click",()=>{
selectedComuna=clean(nombre);
filtroComuna.value=selectedComuna;
applyFilter();
map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);

// ================= SOPORTES
filtrados.forEach(p=>{
if(!p.lat)return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`
<b>Soporte</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}<br>
📢 ${p.tipo||"-"}
`);
});

cluster.addLayer(m);
});

// ================= TIENDAS (SIEMPRE VISIBLES)
tricotFiltrado.forEach(t=>{
if(!t.lat)return;

let cercanos=filtrados.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`
<b>🏬 ${t.nombre||"Tienda Tricot"}</b><br>
📍 ${t.comuna}<br>
Soportes cercanos: ${cercanos}<br>
${getInsight(cercanos)}
`);
});

capaTricot.addLayer(m);
});

// ORDEN VISUAL
capaHex.bringToBack();
capaComunas.bringToFront();
cluster.bringToFront();
capaTricot.bringToFront();

}

// ================= DASHBOARD
function updateDashboard(){

let totalS=filtrados.length;
let totalT=tricotFiltrado.length;

kpiSoportes.innerText="Soportes: "+totalS;
kpiTiendas.innerText="Tiendas: "+totalT;

let insight=
totalS>2000?"🔥 Saturación alta":
totalS>800?"⚡ Mercado activo":
"🧊 Oportunidad";

detalle.innerHTML=`
<b>Resumen</b><br>
Comuna: ${selectedComuna||"Todas"}<br>
Soportes: ${totalS}<br>
Tiendas: ${totalT}<br>
<br>💡 ${insight}
`;
}

// ================= UTILS
function clean(s){return (s||"").toLowerCase().trim();}
function updateDetalle(t){detalle.innerHTML=t;}

function getInsight(n){
if(n>100)return "🔥 Saturado";
if(n>50)return "⚡ Medio";
return "🧊 Oportunidad";
}

</script>
