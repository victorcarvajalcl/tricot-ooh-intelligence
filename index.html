<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricot OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:340px;
background:#0b1324;
padding:15px;
overflow:auto;
}

.card{
background:#111827;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.kpi{
font-size:22px;
font-weight:bold;
}

.map{flex:1}

/* CHIPS */
.chip{
display:inline-block;
padding:6px 10px;
margin:4px;
background:#1e293b;
border-radius:20px;
cursor:pointer;
}
.chip.active{background:#2563eb}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:absolute;
z-index:1000;
width:85%;
height:100%;
left:-100%;
transition:0.3s;
}
.sidebar.open{left:0}
.toggle{
position:absolute;
top:10px;
left:10px;
background:#2563eb;
padding:8px;
border-radius:6px;
cursor:pointer;
z-index:1200;
}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<div>Soportes visibles</div>
<div class="kpi" id="kpiSoportes">0</div>
</div>

<div class="card">
<div>Comuna seleccionada</div>
<div id="comunaSel">—</div>
</div>

<div class="card">
<div>Insight</div>
<div id="insight">—</div>
</div>

<div class="card">
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="tricot">Tricot</div>
<div class="chip active" data-layer="comunas">Comunas</div>
<div class="chip active" data-layer="h3">H3</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
</div>

</div>

<div class="map" id="map"></div>

</div>

<div class="toggle" onclick="toggleSidebar()">☰</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// ================= MAPA
const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= DATA
let soportes,tricot,h3,h6,h8,comunas;

// ================= CAPAS (ORDEN CORRECTO)
let capaComunas=L.layerGroup().addTo(map);
let capaH3=L.layerGroup().addTo(map);
let capaH6=L.layerGroup().addTo(map);
let capaH8=L.layerGroup().addTo(map);

let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15
}).addTo(map);

let capaTricot=L.layerGroup().addTo(map);

// ================= ICONOS
const iconTricot=L.divIcon({
html:"<div style='font-size:28px'>🏬</div>",
iconSize:[30,30]
});

const iconSoporte=L.divIcon({
html:"<div style='width:10px;height:10px;background:#ef4444;border-radius:50%'></div>",
iconSize:[10,10]
});

// ================= ESTADO
let state={soportes:true,tricot:true,h3:true,h6:true,h8:false,comunas:true};

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot_h3.json").then(r=>r.json()),
fetch("data/h3.geojson").then(r=>r.json()).catch(()=>null),
fetch("data/h6.geojson").then(r=>r.json()),
fetch("data/h8.geojson").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json())
]).then(([s,t,h3d,h6d,h8d,c])=>{
soportes=s;
tricot=t;
h3=h3d;
h6=h6d;
h8=h8d;
comunas=c;
init();
});

// ================= INIT
function init(){

document.querySelectorAll(".chip").forEach(chip=>{
chip.onclick=()=>{
let k=chip.dataset.layer;
state[k]=!state[k];
chip.classList.toggle("active");
render();
};
});

map.on("zoomend moveend",render);

render();
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaH3.clearLayers();
capaH6.clearLayers();
capaH8.clearLayers();

// ================= COMUNAS
if(state.comunas){
L.geoJSON(comunas,{
style:{color:"#64748b",weight:1,fillOpacity:0},
onEachFeature:(f,l)=>{
let nombre=f.properties.NOM_COM || f.properties.Comuna;

l.bindTooltip(nombre);

l.on('click',()=>{
let count=soportes.filter(s=>s.comuna===nombre).length;

document.getElementById("comunaSel").innerText=nombre;
document.getElementById("insight").innerText=
count>200?"🔥 Saturada":
count>100?"⚡ Media":
"🧊 Oportunidad";
});
}
}).addTo(capaComunas);
}

// ================= HEX
let z=map.getZoom();

if(z<9 && state.h3 && h3){
L.geoJSON(h3,{style:{color:"#334155",fillOpacity:0.05}}).addTo(capaH3);
}

if(z>=9 && z<=13 && state.h6){
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;
return{
color:"#2563eb",
fillColor:getColor(s),
fillOpacity:0.35
};
},
onEachFeature:(f,l)=>{
l.bindPopup(`
<b>H6</b><br>
Soportes: ${f.properties.soportes}<br>
💡 ${getInsight(f.properties.soportes)}
`);
}
}).addTo(capaH6);
}

if(z>13 && state.h8){
L.geoJSON(h8,{
style:{color:"#9333ea",fillOpacity:0.4}
}).addTo(capaH8);
}

// ================= SOPORTES
if(state.soportes){
soportes.forEach(p=>{
let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.bindPopup(`
<b>${p.nombre||'Soporte'}</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}<br>
🧩 H6: ${p.h6}
`);

cluster.addLayer(m);
});
}

// ================= TRICOT
if(state.tricot){
tricot.forEach(t=>{
let cercanos=soportes.filter(s=>s.h8===t.h8).length;

let nivel=
cercanos>30?"🔥 Saturado":
cercanos>15?"⚡ Alto":
cercanos>5?"🟡 Medio":
"🧊 Oportunidad";

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.bindPopup(`
<b>🏬 TRICOT</b><br>
📍 ${t.comuna}<br>
📊 Soportes cercanos: ${cercanos}<br>
💡 ${nivel}
`);

capaTricot.addLayer(m);
});
}

// KPI
kpiSoportes.innerText=soportes.length;
}

// ================= FUNCIONES
function getColor(s){
if(s>20)return "#1d4ed8";
if(s>10)return "#3b82f6";
if(s>5)return "#60a5fa";
return "#93c5fd";
}

function getInsight(s){
if(s>20)return "Zona caliente";
if(s>10)return "Alta actividad";
if(s>5)return "Media";
return "Oportunidad";
}

// ================= MOBILE
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
