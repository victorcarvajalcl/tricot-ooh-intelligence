<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricot OOH Intelligence BI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:380px;background:#0b1324;padding:15px;overflow:auto}
.card{background:#111827;padding:12px;border-radius:10px;margin-bottom:10px}
.kpi{font-size:20px;font-weight:bold}
.map{flex:1}
select,input{width:100%;margin-bottom:8px;padding:6px;border-radius:6px;border:none}
.ranking-item{background:#1e293b;padding:8px;border-radius:8px;margin-bottom:6px;cursor:pointer}

@media(max-width:768px){
.sidebar{position:absolute;width:85%;left:-100%;transition:.3s}
.sidebar.open{left:0}
.toggle{position:absolute;top:10px;left:10px;background:#2563eb;padding:8px;border-radius:6px;z-index:1000}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>OOH Intelligence BI</h2>

<div class="card">
<div class="kpi" id="kpiSoportes">0</div>
<div>Soportes</div>
<div class="kpi" id="kpiTiendas">0</div>
<div>Tiendas</div>
<div class="kpi" id="kpiRatio">0%</div>
<div>Cobertura</div>
</div>

<div class="card">
<h3>Filtros</h3>
<select id="fComuna"></select>
<select id="fCategoria"></select>
</div>

<div class="card">
<h3>Insight</h3>
<div id="insight">Selecciona una zona</div>
</div>

<div class="card">
<h3>Top Zonas H6 🔥</h3>
<div id="ranking"></div>
</div>

</div>

<div class="map" id="map"></div>

</div>

<div class="toggle" onclick="toggleSidebar()">☰</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],tricot=[],h6;
let filtrados=[];

let cluster=L.markerClusterGroup().addTo(map);

const iconSoporte=L.divIcon({
html:"<div style='width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:26px'>🏬</div>"
});

// LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot.json").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json())
]).then(([s,t,h6d])=>{
soportes=s;
tricot=t;
h6=h6d;
filtrados=soportes;
init();
});

// INIT
function init(){

initFiltros();

document.getElementById("fComuna").onchange=filtrar;
document.getElementById("fCategoria").onchange=filtrar;

render();
}

// FILTROS
function initFiltros(){
let comunas=[...new Set(soportes.map(s=>s.comuna))];
let categorias=[...new Set(soportes.map(s=>s.categoria))];

fComuna.innerHTML="<option value=''>Todas</option>"+comunas.map(c=>`<option>${c}</option>`).join("");
fCategoria.innerHTML="<option value=''>Todas</option>"+categorias.map(c=>`<option>${c}</option>`).join("");
}

function filtrar(){
let c=fComuna.value;
let cat=fCategoria.value;

filtrados=soportes.filter(s=>
(!c || s.comuna===c) &&
(!cat || s.categoria===cat)
);

render();
}

// RENDER
function render(){

cluster.clearLayers();

// SOPORTES
filtrados.forEach(p=>{
if(!p.lat)return;
cluster.addLayer(L.marker([p.lat,p.lng],{icon:iconSoporte})
.on("click",()=>updateInsight(`Soporte<br>${p.comuna}<br>${p.categoria}`))
);
});

// TRICOT
tricot.forEach(t=>{
if(!t.lat)return;

let cercanos=filtrados.filter(s=>s.h8===t.h8).length;

L.marker([t.lat,t.lng],{icon:iconTricot})
.addTo(map)
.on("click",()=>updateInsight(`🏬 ${t.comuna}<br>Soportes cercanos: ${cercanos}`));
});

// H6 ZONAS CALIENTES
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;
return{
color:"#2563eb",
fillColor:s>20?"#1d4ed8":s>10?"#3b82f6":"#93c5fd",
fillOpacity:0.3
};
},
onEachFeature:(f,l)=>{
let s=f.properties.soportes||0;
l.on("click",()=>{
updateInsight(`H6<br>Soportes: ${s}<br>${getInsight(s)}`);
});
}
}).addTo(map);

// KPIs
kpiSoportes.innerText=filtrados.length;
kpiTiendas.innerText=tricot.length;
kpiRatio.innerText=Math.round((filtrados.length/tricot.length)*10)+"%";

// RANKING
renderRanking();

}

// RANKING
function renderRanking(){

let top=h6.features
.map(f=>({score:f.properties.soportes||0,geom:f}))
.sort((a,b)=>b.score-a.score)
.slice(0,5);

ranking.innerHTML="";

top.forEach((z,i)=>{
let div=document.createElement("div");
div.className="ranking-item";
div.innerHTML=`#${i+1} Soportes: ${z.score}`;
div.onclick=()=>map.fitBounds(L.geoJSON(z.geom).getBounds());
ranking.appendChild(div);
});
}

// INSIGHT
function updateInsight(txt){
document.getElementById("insight").innerHTML=txt;
}

function getInsight(s){
if(s>20)return "🔥 Zona caliente";
if(s>10)return "⚡ Alta";
return "🧊 Oportunidad";
}

// MOBILE
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
