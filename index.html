<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricot OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

.sidebar{
width:360px;
background:#0b1324;
padding:15px;
overflow:auto;
}

.card{
background:#111827;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.map{flex:1}

select{width:100%;padding:6px;margin-bottom:10px}

.kpi{font-size:18px;font-weight:bold}

h3{margin:5px 0}

@media(max-width:768px){
.sidebar{position:absolute;width:85%;left:-100%;transition:.3s}
.sidebar.open{left:0}
.toggle{position:absolute;top:10px;left:10px;background:#2563eb;padding:8px;border-radius:6px;z-index:1000}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<h3>Filtro Comuna</h3>
<select id="filtroComuna"></select>
</div>

<div class="card">
<h3>KPIs</h3>
<div id="kpiSoportes"></div>
<div id="kpiTiendas"></div>
</div>

<div class="card">
<h3>Análisis</h3>
<div id="detalle">Haz click en mapa</div>
</div>

</div>

<div id="map" class="map"></div>

</div>

<div class="toggle" onclick="toggleSidebar()">☰</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// ================= DOM
const filtroComuna = document.getElementById("filtroComuna");
const kpiSoportes = document.getElementById("kpiSoportes");
const kpiTiendas = document.getElementById("kpiTiendas");
const detalle = document.getElementById("detalle");

// ================= MAPA
const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= DATA
let soportes=[],tricot=[],comunas,h6;
let filtrados=[],tricotFiltrado=[];
let selectedComuna=null;

// ================= CAPAS
let capaHex=L.layerGroup().addTo(map);
let capaComunas=L.layerGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);

let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15,
iconCreateFunction: function(cluster) {
return L.divIcon({
html: `<div style="background:#ef4444;color:white;border-radius:50%;width:35px;height:35px;display:flex;align-items:center;justify-content:center;font-weight:bold">${cluster.getChildCount()}</div>`
});
}
}).addTo(map);

// ================= ICONOS
const iconSoporte=L.divIcon({
html:"<div style='width:10px;height:10px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:30px'>🏬</div>"
});

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()).catch(()=>[]),
fetch("data/tricot.json").then(r=>r.json()).catch(()=>[]),
fetch("data/comunas.geojson").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json())
]).then(([s,t,c,h])=>{

soportes=s;
tricot=t;
comunas=c;
h6=h;

filtrados=soportes;
tricotFiltrado=tricot;

init();
});

// ================= INIT
function init(){
initFiltro();
render();
updateDashboard();
}

// ================= CLEAN (MEJORADO)
function clean(s){
return (s||"")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.trim();
}

// ================= FILTRO
function initFiltro(){

let comunasUnicas=[...new Set(soportes.map(s=>clean(s.comuna)))];

filtroComuna.innerHTML="<option value=''>Todas</option>";

comunasUnicas.forEach(c=>{
filtroComuna.innerHTML+=`<option value="${c}">${c}</option>`;
});

filtroComuna.onchange=()=>{
selectedComuna=filtroComuna.value || null;
applyFilter();
};
}

function applyFilter(){

filtrados=soportes.filter(s=>{
return !selectedComuna || clean(s.comuna)===selectedComuna;
});

tricotFiltrado=tricot.filter(t=>{
return !selectedComuna || clean(t.comuna)===selectedComuna;
});

render();
updateDashboard();
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaHex.clearLayers();

// ================= HEX
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;

return{
color:"#2563eb",
fillColor:s>200?"#1e3a8a":s>100?"#2563eb":s>50?"#3b82f6":"#93c5fd",
fillOpacity:0.3
};
},
onEachFeature:(f,l)=>{
let s=f.properties.soportes||0;

l.on("click",()=>{
updateDetalle(`
<b>Zona H6</b><br>
Soportes: ${s}<br>
${getInsight(s)}
`);
});
}
}).addTo(capaHex);

// ================= COMUNAS
L.geoJSON(comunas,{
style:{
color:"#22c55e",
weight:2,
fillOpacity:0.05
},
onEachFeature:(f,l)=>{
let nombre=f.properties.NOM_COM;

l.bindTooltip(nombre);

l.on("click",()=>{
selectedComuna=clean(nombre);
filtroComuna.value=selectedComuna;
applyFilter();
map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);

// ================= SOPORTES
filtrados.forEach(p=>{
if(!p.lat || !p.lng) return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`
<b>Soporte</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria || "-"}<br>
📢 ${p.tipo || "-"}
`);
});

cluster.addLayer(m);
});

// ================= TIENDAS (NO SE FILTRAN MAL)
tricot.forEach(t=>{
if(!t.lat || !t.lng) return;

let cercanos=filtrados.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`
<b>🏬 ${t.nombre || "Tienda Tricot"}</b><br>
📍 ${t.comuna}<br>
Soportes cercanos: ${cercanos}<br>
${getInsight(cercanos)}
`);
});

capaTricot.addLayer(m);
});

// ORDEN
capaHex.bringToBack();
capaComunas.bringToFront();
cluster.bringToFront();
capaTricot.bringToFront();

}

// ================= DASHBOARD
function updateDashboard(){

let totalS=filtrados.length;
let totalT=tricot.length;

kpiSoportes.innerText="Soportes: "+totalS;
kpiTiendas.innerText="Tiendas: "+totalT;

let insight=
totalS>2000?"🔥 Saturación alta":
totalS>800?"⚡ Mercado activo":
"🧊 Oportunidad";

detalle.innerHTML=`
<b>Resumen</b><br>
Comuna: ${selectedComuna||"Todas"}<br>
Soportes: ${totalS}<br>
Tiendas: ${totalT}<br>
<br>💡 ${insight}
`;
}

// ================= UTILS
function updateDetalle(t){
detalle.innerHTML=t;
}

function getInsight(n){
if(n>100)return "🔥 Saturado";
if(n>50)return "⚡ Medio";
return "🧊 Oportunidad";
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
