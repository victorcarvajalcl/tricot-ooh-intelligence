<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricot OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

.sidebar{
width:360px;
background:#0b1324;
padding:15px;
overflow:auto;
}

.card{
background:#111827;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.map{flex:1}

select{width:100%;padding:6px;margin-bottom:10px}

.kpi{font-size:18px;font-weight:bold}

h3{margin:5px 0}

@media(max-width:768px){
.sidebar{position:absolute;width:85%;left:-100%;transition:.3s}
.sidebar.open{left:0}
.toggle{position:absolute;top:10px;left:10px;background:#2563eb;padding:8px;border-radius:6px;z-index:1000}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<h3>Filtro Comuna</h3>
<select id="filtroComuna"></select>
</div>

<div class="card">
<h3>KPIs</h3>
<div id="kpiSoportes"></div>
<div id="kpiTiendas"></div>
</div>

<div class="card">
<h3>Análisis</h3>
<div id="detalle">Haz click en mapa</div>
</div>

</div>

<div id="map" class="map"></div>

</div>

<div class="toggle" onclick="toggleSidebar()">☰</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

// ================= MAPA
const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ================= DATA
let soportes=[],tricot=[],comunas,h6;
let filtrados=[],tricotFiltrado=[];

// ================= CAPAS
let capaHex=L.layerGroup().addTo(map);
let capaComunas=L.layerGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);
let cluster=L.markerClusterGroup({
disableClusteringAtZoom:15,
maxClusterRadius:50
}).addTo(map);

// ================= ICONOS
const iconSoporte=L.divIcon({
html:"<div style='width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:28px'>🏬</div>"
});

// ================= LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot.json").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json())
]).then(([s,t,c,h])=>{
soportes=s;
tricot=t;
comunas=c;
h6=h;

filtrados=soportes;
tricotFiltrado=tricot;

init();
});

// ================= INIT
function init(){
initFiltro();
render();
}

// ================= FILTRO
function initFiltro(){

let comunasUnicas=[...new Set(soportes.map(s=>clean(s.comuna)))];

let select=document.getElementById("filtroComuna");

select.innerHTML="<option value=''>Todas</option>";

comunasUnicas.forEach(c=>{
let op=document.createElement("option");
op.value=c;
op.text=c;
select.appendChild(op);
});

select.onchange=()=>{
let val=select.value;

filtrados=soportes.filter(s=>!val || clean(s.comuna)===val);
tricotFiltrado=tricot.filter(t=>!val || clean(t.comuna)===val);

render();
};
}

// ================= RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaHex.clearLayers();

// ================= HEX (FONDO)
L.geoJSON(h6,{
style:f=>{
let s=f.properties.soportes||0;
return{
color:"#2563eb",
fillColor:s>20?"#1d4ed8":s>10?"#3b82f6":"#93c5fd",
fillOpacity:0.2
};
}
}).addTo(capaHex);

// ================= COMUNAS (VISIBLES Y DELINEADAS)
L.geoJSON(comunas,{
style:{
color:"#22c55e",
weight:2,
fillOpacity:0.05
},
onEachFeature:(f,l)=>{

let nombre=f.properties.NOM_COM || f.properties.Comuna;

l.bindTooltip(nombre);

l.on("mouseover",()=>{
l.setStyle({weight:3,color:"#16a34a"});
});

l.on("mouseout",()=>{
l.setStyle({weight:2,color:"#22c55e"});
});

l.on("click",()=>{
let total=soportes.filter(s=>clean(s.comuna)===clean(nombre)).length;

updateDetalle(`
<b>${nombre}</b><br>
Soportes: ${total}<br>
${getInsight(total)}
`);

map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);

// ================= SOPORTES
filtrados.forEach(p=>{
if(!p.lat||!p.lng)return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`
<b>${p.nombre||"Soporte"}</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}
`);
});

cluster.addLayer(m);
});

// ================= TIENDAS
tricotFiltrado.forEach(t=>{
if(!t.lat||!t.lng)return;

let cercanos=filtrados.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`
<b>🏬 ${t.nombre||"Tienda Tricot"}</b><br>
📍 ${t.comuna}<br>
Soportes cercanos: ${cercanos}<br>
${getInsight(cercanos)}
`);
});

capaTricot.addLayer(m);
});

// ================= KPI
kpiSoportes.innerText="Soportes: "+filtrados.length;
kpiTiendas.innerText="Tiendas: "+tricotFiltrado.length;

// ================= ORDEN CAPAS
capaHex.bringToBack();
capaComunas.bringToFront();
cluster.bringToFront();
capaTricot.bringToFront();

}

// ================= UTILS
function clean(str){
return (str||"").toLowerCase().trim();
}

function updateDetalle(txt){
document.getElementById("detalle").innerHTML=txt;
}

function getInsight(n){
if(n>200)return "🔥 Zona saturada";
if(n>100)return "⚡ Cobertura media";
return "🧊 Oportunidad comercial";
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
