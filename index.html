<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricot OOH Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:360px;background:#0b1324;padding:15px;overflow:auto}
.card{background:#111827;padding:12px;border-radius:10px;margin-bottom:10px}
.kpi{font-size:22px;font-weight:bold}
.map{flex:1}

.chip{padding:6px 10px;background:#1e293b;border-radius:20px;cursor:pointer;display:inline-block;margin:4px}
.chip.active{background:#2563eb}

h3{margin:6px 0}

@media(max-width:768px){
.sidebar{position:absolute;width:85%;left:-100%;transition:0.3s;z-index:1000}
.sidebar.open{left:0}
.toggle{position:absolute;top:10px;left:10px;background:#2563eb;padding:8px;border-radius:6px;z-index:1200}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>OOH Intelligence</h2>

<div class="card">
<h3>Resumen</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>Selección</h3>
<div id="detalle">Selecciona un elemento</div>
</div>

<div class="card">
<h3>Capas</h3>
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="tricot">Tricot</div>
<div class="chip active" data-layer="comunas">Comunas</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
</div>

</div>

<div class="map" id="map"></div>

</div>

<div class="toggle" onclick="toggleSidebar()">☰</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],tricot=[],h6,h8,comunas;

let cluster=L.markerClusterGroup().addTo(map);
let capaTricot=L.layerGroup().addTo(map);
let capaComunas=L.layerGroup().addTo(map);
let capaH6=L.layerGroup().addTo(map);
let capaH8=L.layerGroup().addTo(map);

let state={soportes:true,tricot:true,comunas:true,h6:true,h8:false};

// ICONOS
const iconSoporte=L.divIcon({
html:"<div style='width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid white'></div>"
});

const iconTricot=L.divIcon({
html:"<div style='font-size:26px'>🏬</div>"
});

// LOAD
Promise.all([
fetch("data/soportes_h3.json").then(r=>r.json()),
fetch("data/tricot.json").then(r=>r.json()),
fetch("data/h6.geojson").then(r=>r.json()),
fetch("data/h8.geojson").then(r=>r.json()),
fetch("data/comunas.geojson").then(r=>r.json())
]).then(([s,t,h6d,h8d,c])=>{
soportes=s;
tricot=t;
h6=h6d;
h8=h8d;
comunas=c;
init();
});

// INIT
function init(){

document.querySelectorAll(".chip").forEach(chip=>{
chip.onclick=()=>{
let k=chip.dataset.layer;
state[k]=!state[k];
chip.classList.toggle("active");
render();
};
});

map.on("zoomend moveend",render);

render();
}

// RENDER
function render(){

cluster.clearLayers();
capaTricot.clearLayers();
capaComunas.clearLayers();
capaH6.clearLayers();
capaH8.clearLayers();

// ================= COMUNAS
if(state.comunas){
L.geoJSON(comunas,{
style:{color:"#94a3b8",weight:1,fillOpacity:0.1},
onEachFeature:(f,l)=>{

let nombre=f.properties.NOM_COM||f.properties.Comuna;

l.bindTooltip(nombre);

l.on("click",()=>{

let sCom=soportes.filter(s=>clean(s.comuna)===clean(nombre));
let tCom=tricot.filter(t=>clean(t.comuna)===clean(nombre));

updateDetalle(`
<b>${nombre}</b><br>
Soportes: ${sCom.length}<br>
Tiendas: ${tCom.length}<br><br>
${insightZona(sCom.length)}
`);

map.fitBounds(l.getBounds());
});
}
}).addTo(capaComunas);
}

// ================= H6
if(state.h6){
L.geoJSON(h6,{
style:f=>({color:"#2563eb",fillOpacity:0.3})
}).addTo(capaH6);
}

// ================= H8
if(state.h8){
L.geoJSON(h8,{
style:{color:"#9333ea",fillOpacity:0.4}
}).addTo(capaH8);
}

// ================= SOPORTES
if(state.soportes){
soportes.forEach(p=>{
if(!p.lat||!p.lng)return;

let m=L.marker([p.lat,p.lng],{icon:iconSoporte});

m.on("click",()=>{
updateDetalle(`
<b>${p.nombre||"Soporte"}</b><br>
📍 ${p.comuna}<br>
🏷 ${p.categoria}<br>
🧩 H6: ${p.h6}
`);
});

cluster.addLayer(m);
});
}

// ================= TRICOT
if(state.tricot){
tricot.forEach(t=>{
if(!t.lat||!t.lng)return;

let cercanos=soportes.filter(s=>s.h8===t.h8).length;

let m=L.marker([t.lat,t.lng],{icon:iconTricot});

m.on("click",()=>{
updateDetalle(`
<b>🏬 ${t.nombre||"Tienda Tricot"}</b><br>
📍 ${t.comuna}<br>
Soportes cercanos: ${cercanos}<br>
${insightZona(cercanos)}
`);
});

capaTricot.addLayer(m);
});
}

// STATS
document.getElementById("stats").innerHTML=
`Soportes: ${soportes.length}<br>Tiendas: ${tricot.length}`;

cluster.bringToFront();
capaTricot.bringToFront();
}

// ================= UTILS
function updateDetalle(html){
document.getElementById("detalle").innerHTML=html;
}

function clean(str){
return (str||"").toLowerCase().trim();
}

function insightZona(n){
if(n>200)return "🔥 Zona saturada";
if(n>100)return "⚡ Cobertura media";
return "🧊 Oportunidad";
}

// MOBILE
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
