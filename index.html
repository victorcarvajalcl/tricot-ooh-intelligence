<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:360px;background:#0b1324;padding:15px;overflow:auto}
#map{flex:1}

.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}
select,input{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none}

.chip{display:inline-block;padding:8px 12px;margin:3px;background:#0a1b3a;border-radius:20px;cursor:pointer}
.chip.active{background:#2563eb}
</style>
</head>

<body>

<div class="app">
<div class="sidebar">

<h2>📊 OOH Intelligence</h2>

<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Tiendas: <b id="totalTiendas">0</b></div>
<div class="stat">Comunas: <b id="totalComunas">0</b></div>

<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>

<button onclick="reset()">Reset</button>

<div>
<span class="chip active" data-layer="soportes">Soportes</span>
<span class="chip active" data-layer="tiendas">Tiendas</span>
<span class="chip active" data-layer="h3">H3</span>
<span class="chip active" data-layer="h6">H6</span>
<span class="chip" data-layer="h8">H8</span>
</div>

</div>

<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.js"></script>

<script>

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],tiendas=[];
let filtrados=[],tiendasFiltradas=[];
let h3Layer,h6Layer,h8Layer;

const layersState={
soportes:true,tiendas:true,h3:true,h6:true,h8:false
};

// 🔥 CLUSTER MEJORADO (VISUAL)
let cluster=L.markerClusterGroup({
disableClusteringAtZoom:17,
iconCreateFunction: function(cluster) {
const count = cluster.getChildCount();
return L.divIcon({
html:`<div style="
background:#ff2d55;
color:white;
border-radius:50%;
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
border:3px solid white;
box-shadow:0 0 10px rgba(0,0,0,0.6);
">${count}</div>`,
className:''
});
}
});

// ICONO TIENDAS
const tiendaIcon = L.divIcon({
html:`<div style="
background:#2563eb;
width:22px;height:22px;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 10px rgba(0,0,0,0.8);
"></div>`,
className:''
});

async function load(){

const [s,t,h3,h6,h8]=await Promise.all([
fetch('data/soportes_h3.json').then(r=>r.json()),
fetch('data/tricot.json').then(r=>r.json()),
fetch('data/h3.geojson').then(r=>r.json()),
fetch('data/h6.geojson').then(r=>r.json()),
fetch('data/h8.geojson').then(r=>r.json())
]);

soportes=s;
tiendas=t;

filtrados=s;
tiendasFiltradas=t;

init();
renderHex(h3,h6,h8);
render();

map.on('zoomend', controlarZoom);
}

function controlarZoom(){
const z=map.getZoom();
layersState.h3 = z>=10 && z<=12;
layersState.h6 = z>=13 && z<=15;
layersState.h8 = z>=16;
updateHexVisibility();
render();
}

function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna))];
const categorias=[...new Set(soportes.map(s=>s.categoria))];

document.getElementById('comuna').innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
document.getElementById('categoria').innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

document.querySelectorAll('.chip').forEach(c=>{
c.onclick=()=>{
const k=c.dataset.layer;
layersState[k]=!layersState[k];
c.classList.toggle('active');
updateHexVisibility();
render();
};
});
}

function filtrar(){

const q=document.getElementById('search').value.toLowerCase();
const comuna=document.getElementById('comuna').value;
const cat=document.getElementById('categoria').value;

filtrados=soportes.filter(s=>
(!q||s.nombre.toLowerCase().includes(q)) &&
(!comuna||s.comuna===comuna) &&
(!cat||s.categoria===cat)
);

tiendasFiltradas=tiendas.filter(t=>
(!comuna||t.comuna===comuna)
);

render();
}

function render(){

map.removeLayer(cluster);
cluster.clearLayers();

// 🔴 SOPORTES (TAMAÑO DINÁMICO)
filtrados.forEach(p=>{

const zoom=map.getZoom();
const size = zoom>=16?6:zoom>=14?4:3;

const m=L.circleMarker([p.lat,p.lng],{
radius:size,
color:'#fff',
fillColor:'#ff2d55',
fillOpacity:1
});

cluster.addLayer(m);

});

// 🔵 TIENDAS (ANÁLISIS COMPLETO)
tiendasFiltradas.forEach(t=>{

const m=L.marker([t.lat,t.lng],{icon:tiendaIcon});

m.bindPopup(()=>{

const cercanos=filtrados.filter(s=>map.distance([t.lat,t.lng],[s.lat,s.lng])<500);

let nivel="🟢 Baja";
if(cercanos.length>30) nivel="🔴 Alta";
else if(cercanos.length>10) nivel="🟡 Media";

let distancias=cercanos.map(s=>map.distance([t.lat,t.lng],[s.lat,s.lng]));
let promedio=distancias.length?Math.round(distancias.reduce((a,b)=>a+b,0)/distancias.length):0;

return `
<b>🏬 ${t.nombre}</b><br>
${t.comuna}<br><br>
📊 Soportes: ${cercanos.length}<br>
📏 Distancia promedio: ${promedio} m<br>
Nivel: ${nivel}
`;
});

cluster.addLayer(m);

});

map.addLayer(cluster);

// KPIs
document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalTiendas').innerText=tiendasFiltradas.length;
document.getElementById('totalComunas').innerText=new Set(filtrados.map(s=>s.comuna)).size;

}

// HEX
function renderHex(h3,h6,h8){

h3Layer=L.geoJSON(h3,{style:{color:'#22c55e',fillOpacity:0.2},onEachFeature:(f,l)=>popupHex(f,l)}).addTo(map);
h6Layer=L.geoJSON(h6,{style:{color:'#2563eb',fillOpacity:0.3},onEachFeature:(f,l)=>popupHex(f,l)}).addTo(map);
h8Layer=L.geoJSON(h8,{style:{color:'#9333ea',fillOpacity:0.25},onEachFeature:(f,l)=>popupHex(f,l)}).addTo(map);

}

function popupHex(f,l){

l.on('click',()=>{

const bounds=l.getBounds();

const dentro=filtrados.filter(s=>bounds.contains([s.lat,s.lng]));

let nivel="🟢 Baja";
if(dentro.length>50) nivel="🔴 Alta";
else if(dentro.length>20) nivel="🟡 Media";

l.bindPopup(`
<b>📊 HEX</b><br>
Soportes: ${dentro.length}<br>
Nivel: ${nivel}
`).openPopup();

});
}

function updateHexVisibility(){
if(h3Layer) map[layersState.h3?'addLayer':'removeLayer'](h3Layer);
if(h6Layer) map[layersState.h6?'addLayer':'removeLayer'](h6Layer);
if(h8Layer) map[layersState.h8?'addLayer':'removeLayer'](h8Layer);
}

function reset(){
filtrados=soportes;
tiendasFiltradas=tiendas;
map.setView([-33.45,-70.66],11);
render();
}

load();

</script>
</body>
</html>
