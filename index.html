<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial}
.app{display:flex;height:100vh}
.sidebar{width:340px;background:#0b1324;color:#fff;padding:15px;overflow:auto}
#map{flex:1}

.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}
select,input{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>📊 OOH Intelligence</h2>

<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Tiendas: <b id="totalTiendas">0</b></div>
<div class="stat">Comunas: <b id="totalComunas">0</b></div>

<input id="search" placeholder="Buscar">
<select id="comuna"></select>
<select id="categoria"></select>

<button onclick="reset()">Reset</button>

<div id="topZonas"></div>
</div>

<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],tiendas=[],comunas=[];
let filtrados=[],tiendasFiltradas=[];
let cluster=L.markerClusterGroup();
let capaComunas;

// ================= LOAD
async function load(){

soportes=await fetch('data/soportes_h3.json').then(r=>r.json());
tiendas=await fetch('data/tricot.json').then(r=>r.json());
comunas=await fetch('data/comunas.geojson').then(r=>r.json());

filtrados=soportes;
tiendasFiltradas=tiendas;

init();
drawComunas();
render();

}

// ================= COMUNAS
function drawComunas(){

capaComunas=L.geoJSON(comunas,{
style:{
color:"#000",
weight:1,
fillOpacity:0
},
onEachFeature:(f,l)=>{

l.on('mouseover',()=>{
l.setStyle({fillOpacity:0.2,color:"#2563eb"});
});

l.on('mouseout',()=>{
l.setStyle({fillOpacity:0,color:"#000"});
});

l.on('click',()=>{
document.getElementById('comuna').value=f.properties.NOM_COM;
filtrar();
});

}
}).addTo(map);

}

// ================= INIT
function init(){

const comunasList=[...new Set(soportes.map(s=>s.comuna))];
const categorias=[...new Set(soportes.map(s=>s.categoria))];

document.getElementById('comuna').innerHTML='<option value="">Todas</option>'+comunasList.map(c=>`<option>${c}</option>`).join('');
document.getElementById('categoria').innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

}

// ================= FILTRO
function filtrar(){

const q=document.getElementById('search').value.toLowerCase();
const comuna=document.getElementById('comuna').value;
const cat=document.getElementById('categoria').value;

filtrados=soportes.filter(s=>
(!q||s.nombre.toLowerCase().includes(q)) &&
(!comuna||s.comuna===comuna) &&
(!cat||s.categoria===cat)
);

tiendasFiltradas=tiendas.filter(t=>
(!comuna||t.comuna===comuna)
);

render();

}

// ================= RENDER
function render(){

map.removeLayer(cluster);
cluster=L.markerClusterGroup();

// 🔴 SOPORTES (SIEMPRE VISIBLES)
filtrados.forEach(p=>{

const m=L.circleMarker([p.lat,p.lng],{
radius:4,
color:'#fff',
fillColor:'#ef4444',
fillOpacity:1
});

m.bindPopup(`
<b>${p.nombre}</b><br>
${p.comuna}<br>
${p.categoria}
`);

cluster.addLayer(m);

});

// 🔵 TIENDAS
tiendasFiltradas.forEach(t=>{

const m=L.marker([t.lat,t.lng]);

m.bindPopup(()=>{

const cercanos=filtrados.filter(s=>map.distance([t.lat,t.lng],[s.lat,s.lng])<500);

return `
<b>${t.nombre}</b><br>
${t.comuna}<br><br>
Soportes cercanos: ${cercanos.length}<br>
Nivel: ${cercanos.length>30?"🔴 Alta":cercanos.length>10?"🟡 Media":"🟢 Baja"}
`;

});

cluster.addLayer(m);

});

map.addLayer(cluster);

// KPIs
document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalTiendas').innerText=tiendasFiltradas.length;
document.getElementById('totalComunas').innerText=new Set(filtrados.map(s=>s.comuna)).size;

// TOP
const conteo={};
filtrados.forEach(s=>{
conteo[s.comuna]=(conteo[s.comuna]||0)+1;
});

const top=Object.entries(conteo)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

document.getElementById('topZonas').innerHTML=
"<h3>Top comunas</h3>"+
top.map(t=>`<div>${t[0]}: ${t[1]}</div>`).join('');

}

// ================= RESET
function reset(){
filtrados=soportes;
tiendasFiltradas=tiendas;
map.setView([-33.45,-70.66],11);
render();
}

load();

</script>

</body>
</html>
