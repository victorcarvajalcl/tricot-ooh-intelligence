<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OOH Analysis PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:75%;}
#sidebar{
position:absolute;
right:0;
top:0;
width:25%;
height:100vh;
background:#111;
color:#fff;
padding:15px;
overflow:auto;
}
button{margin:3px;padding:6px 10px;border:none;background:#333;color:#fff;cursor:pointer;}
select{width:100%;padding:6px;margin-top:10px;}
.kpi{background:#222;padding:10px;margin:5px 0;border-radius:5px;}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
<h2>📊 OOH Dashboard</h2>

<select id="comunaFilter">
<option value="">Todas las comunas</option>
</select>

<div class="kpi" id="kpiTiendas"></div>
<div class="kpi" id="kpiSoportes"></div>

<h3>Capas</h3>
<button onclick="toggleLayer('h3')">H3</button>
<button onclick="toggleLayer('h6')">H6</button>
<button onclick="toggleLayer('h8')">H8</button>

<h3>Detalle</h3>
<div id="detalle"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="data/tricot.json"></script>
<script src="data/soportes.json"></script>
<script src="data/comunas.json"></script>
<script src="data/h3.json"></script>
<script src="data/h6.json"></script>
<script src="data/h8.json"></script>

<script>

const map = L.map('map').setView([-33.45,-70.65],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let capaHex = L.layerGroup().addTo(map);
let capaTiendas = L.markerClusterGroup().addTo(map);
let capaSoportes = L.markerClusterGroup().addTo(map);
let capaComunas = L.layerGroup().addTo(map);

let state = {h3:false,h6:false,h8:false};

const kpiTiendas = document.getElementById("kpiTiendas");
const kpiSoportes = document.getElementById("kpiSoportes");
const detalle = document.getElementById("detalle");
const comunaFilter = document.getElementById("comunaFilter");


// =====================
// DISTANCIA REAL
// =====================
function getDistance(lat1, lon1, lat2, lon2){
const R = 6371;
const dLat = (lat2-lat1) * Math.PI/180;
const dLon = (lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}


// =====================
// COLORES HEX
// =====================
function getColor(d){
return d > 50 ? "#ff0000" :
d > 20 ? "#ff8800" :
d > 10 ? "#ffff00" :
"#00ff00";
}


// =====================
// COMUNAS
// =====================
function loadComunas(){
capaComunas.clearLayers();

L.geoJSON(comunas,{
style:{color:"#888",weight:1,fillOpacity:0.05},
onEachFeature:(f,l)=>{
l.on("mouseover",()=>l.setStyle({fillOpacity:0.2}));
l.on("mouseout",()=>l.setStyle({fillOpacity:0.05}));
}
}).addTo(capaComunas);
}


// =====================
// HEXÁGONOS
// =====================
function drawHex(data,color){
L.geoJSON(data,{
style:f=>({
color:color,
fillColor:getColor(f.properties.soportes||0),
fillOpacity:0.35
})
}).addTo(capaHex);
}

function loadHex(){
capaHex.clearLayers();

if(state.h3) drawHex(h3,"#2563eb");
if(state.h6) drawHex(h6,"#7c3aed");
if(state.h8) drawHex(h8,"#f59e0b");
}


// =====================
// TIENDAS + ANALISIS
// =====================
function loadTiendas(){
capaTiendas.clearLayers();

let selected = comunaFilter.value;

let tiendasFiltradas = selected
? tricot.filter(t=>t.comuna===selected)
: tricot;

tiendasFiltradas.forEach(t=>{

let cercanos300=0,cercanos500=0,cercanos1000=0;

soportes.forEach(s=>{
let d = getDistance(t.lat,t.lng,s.lat,s.lng);
if(d<=0.3) cercanos300++;
if(d<=0.5) cercanos500++;
if(d<=1) cercanos1000++;
});

let m = L.marker([t.lat,t.lng])
.bindPopup(`
<b>${t.nombre}</b><br>
${t.comuna}<br><br>
300m: ${cercanos300}<br>
500m: ${cercanos500}<br>
1km: ${cercanos1000}<br>
`);

m.on("click",()=>{
detalle.innerHTML = `
<h4>${t.nombre}</h4>
${t.comuna}<br><br>

<b>Impacto OOH</b><br>
300m: ${cercanos300}<br>
500m: ${cercanos500}<br>
1km: ${cercanos1000}<br>

<b>Nivel:</b> ${cercanos500>20?"🔥 Alto":cercanos500>10?"⚡ Medio":"🟢 Bajo"}
`;
});

capaTiendas.addLayer(m);

});
}


// =====================
// SOPORTES
// =====================
function loadSoportes(){
capaSoportes.clearLayers();

let selected = comunaFilter.value;

let soportesFiltrados = selected
? soportes.filter(s=>s.comuna===selected)
: soportes;

soportesFiltrados.forEach(s=>{
capaSoportes.addLayer(L.marker([s.lat,s.lng]));
});
}


// =====================
// KPIs
// =====================
function updateKPIs(){

let selected = comunaFilter.value;

let tiendasFiltradas = selected
? tricot.filter(t=>t.comuna===selected)
: tricot;

let soportesFiltrados = selected
? soportes.filter(s=>s.comuna===selected)
: soportes;

kpiTiendas.innerText = "Tiendas: "+tiendasFiltradas.length;
kpiSoportes.innerText = "Soportes: "+soportesFiltrados.length;

}


// =====================
// FILTRO COMUNA
// =====================
function loadFilter(){

let comunasUnicas = [...new Set(tricot.map(t=>t.comuna))];

comunasUnicas.forEach(c=>{
let opt = document.createElement("option");
opt.value = c;
opt.text = c;
comunaFilter.appendChild(opt);
});

comunaFilter.onchange=()=>{

let selected = comunaFilter.value;

if(selected){
let layer = L.geoJSON(comunas);

layer.eachLayer(l=>{
if(l.feature.properties.NOM_COM === selected){
map.fitBounds(l.getBounds());
}
});
}

loadTiendas();
loadSoportes();
updateKPIs();

};
}


// =====================
// CONTROL CAPAS
// =====================
function toggleLayer(layer){
state[layer] = !state[layer];
loadHex();
}


// =====================
// INIT
// =====================
loadComunas();
loadFilter();
loadTiendas();
loadSoportes();
updateKPIs();

</script>

</body>
</html>
