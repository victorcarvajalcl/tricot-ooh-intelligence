<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OOH Intelligence PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

.sidebar{
width:360px;background:#0b1324;padding:15px;overflow:auto;z-index:1000
}

#map{flex:1}

/* PANEL ANALISIS */
.panel{
background:#071633;
padding:12px;
border-radius:12px;
margin-top:15px;
font-size:13px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.panel h3{margin:0 0 8px 0;font-size:14px}

.btn{
display:block;
width:100%;
margin-top:6px;
padding:8px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}

select,input{
width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none
}

.chip{
display:inline-block;padding:8px 12px;margin:3px;background:#0a1b3a;border-radius:20px;cursor:pointer
}
.chip.active{background:#2563eb}

.menu-btn{
display:none;position:absolute;top:10px;left:10px;z-index:1100;
background:#2563eb;color:white;border:none;padding:10px;border-radius:8px
}

@media(max-width:768px){
.app{flex-direction:column}
.sidebar{position:absolute;width:80%;height:100%;left:-100%;top:0}
.sidebar.open{left:0}
#map{height:100vh}
.menu-btn{display:block}
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="app">

<div class="sidebar" id="sidebar">

<h2>📊 OOH Intelligence</h2>

<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Tiendas: <b id="totalTiendas">0</b></div>
<div class="stat">Comunas: <b id="totalComunas">0</b></div>

<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>

<button onclick="reset()">Reset</button>

<div>
<span class="chip active" data-layer="soportes">Soportes</span>
<span class="chip active" data-layer="tiendas">Tiendas</span>
<span class="chip active" data-layer="h3">H3</span>
<span class="chip active" data-layer="h6">H6</span>
<span class="chip" data-layer="h8">H8</span>
</div>

<!-- 🧠 PANEL ANALISIS -->
<div class="panel" id="panelAnalisis">
<h3>🧠 Inteligencia Comercial</h3>
Selecciona un elemento en el mapa
<button class="btn" onclick="filtrarOportunidad()">Ver oportunidades</button>
<button class="btn" onclick="filtrarSaturacion()">Zonas saturadas</button>
<button class="btn" onclick="limpiarAnalisis()">Reset análisis</button>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

function mostrarPanel(html){
document.getElementById("panelAnalisis").innerHTML=html;
}

function limpiarAnalisis(){
document.getElementById("panelAnalisis").innerHTML=`
<h3>🧠 Inteligencia Comercial</h3>
Selecciona un elemento en el mapa
`;
}

function filtrarOportunidad(){
const low=filtrados.filter(s=>s.categoria==="BAJA");
alert("Zonas de oportunidad detectadas: "+low.length);
}

function filtrarSaturacion(){
const high=filtrados.length;
alert("Alta saturación detectada en "+high+" puntos");
}

// MENU
function toggleMenu(){
document.getElementById('sidebar').classList.toggle('open');
setTimeout(()=>map.invalidateSize(),300);
}

const map=L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let soportes=[],tiendas=[];
let filtrados=[],tiendasFiltradas=[];

let cluster=L.markerClusterGroup({disableClusteringAtZoom:16});

let h3Layer,h6Layer,h8Layer;

const layersState={
soportes:true,tiendas:true,h3:true,h6:true,h8:false
};

const tiendaIcon = L.divIcon({
html:`<div style="background:#2563eb;width:24px;height:24px;border-radius:50%;border:3px solid white;"></div>`
});

async function load(){

const [s,t,h3,h6,h8]=await Promise.all([
fetch('data/soportes_h3.json').then(r=>r.json()),
fetch('data/tricot.json').then(r=>r.json()),
fetch('data/h3.geojson').then(r=>r.json()),
fetch('data/h6.geojson').then(r=>r.json()),
fetch('data/h8.geojson').then(r=>r.json())
]);

soportes=s;
tiendas=t;

filtrados=s;
tiendasFiltradas=t;

init();
renderHex(h3,h6,h8);
render();
}

// INIT
function init(){

const comunas=[...new Set(soportes.map(s=>s.comuna).filter(c=>c))];
const categorias=[...new Set(soportes.map(s=>s.categoria).filter(c=>c))];

document.getElementById('comuna').innerHTML='<option value="">Todas</option>'+comunas.map(c=>`<option>${c}</option>`).join('');
document.getElementById('categoria').innerHTML='<option value="">Todas</option>'+categorias.map(c=>`<option>${c}</option>`).join('');

['search','comuna','categoria'].forEach(id=>{
document.getElementById(id).addEventListener('input',filtrar);
});

document.querySelectorAll('.chip').forEach(c=>{
c.onclick=()=>{
const k=c.dataset.layer;
layersState[k]=!layersState[k];
c.classList.toggle('active');
render();
};
});
}

// FILTRO
function filtrar(){

const q=document.getElementById('search').value.toLowerCase();
const comuna=document.getElementById('comuna').value;

filtrados=soportes.filter(s=>
(!q||s.nombre.toLowerCase().includes(q)) &&
(!comuna||s.comuna===comuna)
);

tiendasFiltradas=tiendas.filter(t=>
(!comuna||t.comuna===comuna)
);

render();
}

// RENDER
function render(){

map.removeLayer(cluster);
cluster.clearLayers();

let tiendasLayer=L.layerGroup();

// SOPORTES
if(layersState.soportes){
filtrados.forEach(p=>{

const m=L.circleMarker([p.lat,p.lng],{
radius:5,color:'#fff',fillColor:'#ef4444',fillOpacity:1
});

m.on('click',()=>{
mostrarPanel(`
<h3>📍 SOPORTE</h3>
${p.nombre}<br>
${p.comuna}<br><br>
💡 Punto estratégico para evaluación
`);
});

cluster.addLayer(m);
});
}

// TIENDAS
if(layersState.tiendas){
tiendasFiltradas.forEach(t=>{

const m=L.marker([t.lat,t.lng],{icon:tiendaIcon});

m.on('click',()=>{

const cercanos=filtrados.filter(s=>map.distance([t.lat,t.lng],[s.lat,s.lng])<500);

mostrarPanel(`
<h3>🏬 ${t.nombre}</h3>
${t.comuna}<br><br>
📊 Soportes: ${cercanos.length}<br>
💡 ${cercanos.length<10?"Oportunidad":"Alta competencia"}
`);
});

tiendasLayer.addLayer(m);
});
}

map.addLayer(cluster);
map.addLayer(tiendasLayer);

document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalTiendas').innerText=tiendasFiltradas.length;
}

// HEX
function renderHex(h3,h6,h8){

h3Layer=L.geoJSON(h3,{onEachFeature:(f,l)=>popupHex(f,l,'H3')}).addTo(map);
h6Layer=L.geoJSON(h6,{onEachFeature:(f,l)=>popupHex(f,l,'H6')}).addTo(map);
h8Layer=L.geoJSON(h8,{onEachFeature:(f,l)=>popupHex(f,l,'H8')}).addTo(map);
}

function popupHex(f,l,tipo){
l.on('click',()=>{
mostrarPanel(`
<h3>🧩 HEX ${tipo}</h3>
Zona analizada<br>
💡 Evaluar inversión
`);
});
}

function reset(){
filtrados=soportes;
tiendasFiltradas=tiendas;
render();
}

load();

</script>
</body>
</html>
